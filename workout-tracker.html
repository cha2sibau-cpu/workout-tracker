<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Workout Tracker</title>
<style>
:root {
  --bg: #f2f2f7;
  --card: #ffffff;
  --border: #d1d1d6;
  --text: #1c1c1e;
  --text-secondary: #6e6e73;
  --accent: #007aff;
  --accent-light: #e8f0fe;
  --red: #ff3b30;
  --red-bg: #fff2f1;
  --amber: #ff9500;
  --amber-bg: #fff8ec;
  --green: #34c759;
  --green-bg: #f0fff4;
  --tab-h: 83px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--tab-h) + var(--safe-bottom));-webkit-font-smoothing:antialiased}

/* ── Tab bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;padding-bottom:var(--safe-bottom);z-index:999}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:6px 4px;cursor:pointer;color:var(--text-secondary);font-size:10px;font-weight:500;min-height:44px;transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:24px;height:24px;stroke-width:1.8}

/* ── Layout ── */
.tab-pane{display:none;padding:0 16px 24px;max-width:820px;margin:0 auto}
.tab-pane.active{display:block}

/* ── Page header ── */
.ph{padding:20px 0 10px}
.ph-title{font-size:30px;font-weight:700;letter-spacing:-.5px}
.ph-sub{font-size:14px;color:var(--text-secondary);margin-top:3px}

/* ── Card ── */
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:17px;font-weight:600;margin-bottom:12px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:600}
.badge-blue{background:var(--accent-light);color:var(--accent)}
.badge-gray{background:#f2f2f7;color:var(--text-secondary);font-size:12px}
.badge-green{background:#e8f9ee;color:#1a7f3c}
.badge-push{background:#e8f5e9;color:#2e7d32}
.badge-pull{background:#e3f2fd;color:#1565c0}
.badge-mob{background:#f3e5f5;color:#6a1b9a}
.badge-lower{background:#fff3e0;color:#e65100}
.badge-rest{background:#f5f5f5;color:#616161}

/* ── Section label ── */
.sec-label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px}

/* ── Checklist ── */
.checklist{list-style:none}
.cl-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:48px;user-select:none}
.cl-item:last-child{border-bottom:none}
.cl-item input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.cl-item label{font-size:15px;cursor:pointer;flex:1;line-height:1.4}
.cl-item.done label{text-decoration:line-through;color:var(--text-secondary)}

/* ── Warning label ── */
.warn-label{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--red);background:var(--red-bg);padding:4px 9px;border-radius:8px;flex-shrink:0;line-height:1.3;margin-top:4px}

/* ── Exercise block ── */
.ex-block{margin-bottom:20px}
.ex-block:last-child{margin-bottom:0}
.ex-header{margin-bottom:8px}
.ex-name{font-size:16px;font-weight:600;line-height:1.3}
.ex-target{font-size:12px;color:var(--text-secondary);margin-top:2px}
.ex-divider{height:1px;background:var(--border);margin:16px 0}

/* ── Log table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px}
table.log-tbl{border-collapse:collapse;min-width:480px;width:100%}
.log-tbl th{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;padding:5px 4px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
.log-tbl th:first-child{text-align:left;width:26px;padding-left:0}
.log-tbl td{padding:3px 3px;text-align:center;vertical-align:middle}
.log-tbl td:first-child{font-size:13px;font-weight:600;color:var(--text-secondary);text-align:left;padding-left:0}
.log-tbl input{width:100%;min-height:46px;border:1.5px solid var(--border);border-radius:9px;padding:4px 5px;font-size:15px;text-align:center;background:var(--bg);color:var(--text);font-family:inherit;transition:border-color .15s,background .15s;-webkit-appearance:none}
.log-tbl input:focus{outline:none;border-color:var(--accent);background:var(--accent-light)}
.log-tbl input.note-inp{text-align:left;font-size:13px}
.log-tbl col.c-set{width:28px}
.log-tbl col.c-kg{width:62px}
.log-tbl col.c-rep{width:52px}
.log-tbl col.c-note{width:auto;min-width:80px}

/* ── Buttons ── */
.btn{display:block;width:100%;min-height:52px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{opacity:.78;transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent);font-size:15px;min-height:46px}
.btn-sm{min-height:44px;font-size:14px;border-radius:11px}
.btn + .btn{margin-top:10px}

/* ── Completion banner ── */
.complete-banner{background:var(--green-bg);border:1.5px solid var(--green);border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.complete-banner .cb-icon{font-size:24px}
.complete-banner .cb-text{font-size:15px;font-weight:600;color:#1a7f3c}
.complete-banner .cb-sub{font-size:13px;color:#2d9e52}

/* ── Rest screen ── */
.rest-screen{text-align:center;padding:50px 20px}
.rest-icon{font-size:72px;margin-bottom:18px}
.rest-title{font-size:26px;font-weight:700;margin-bottom:8px}
.rest-sub{font-size:16px;color:var(--text-secondary);line-height:1.5}

/* ── Log tab ── */
.session-card{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.session-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;min-height:56px;gap:8px}
.session-date{font-weight:600;font-size:15px}
.session-meta{font-size:12px;color:var(--text-secondary);margin-top:2px}
.session-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.session-chev{color:var(--text-secondary);font-size:14px;transition:transform .2s}
.session-chev.open{transform:rotate(180deg)}
.session-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.session-body.open{display:block}
.sess-ex{margin-top:14px}
.sess-ex-name{font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
table.view-tbl{border-collapse:collapse;width:100%;font-size:13px}
.view-tbl th{color:var(--text-secondary);font-weight:500;text-align:center;padding:5px 6px;font-size:11px;border-bottom:1px solid var(--border)}
.view-tbl th:first-child{text-align:left}
.view-tbl td{text-align:center;padding:5px 6px;border-bottom:1px solid var(--border)}
.view-tbl td:first-child{text-align:left;font-weight:600}
.view-tbl tr:last-child td{border-bottom:none}
.view-tbl td:last-child{text-align:left;color:var(--text-secondary);font-size:12px}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--text-secondary)}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px}

/* ── Schedule tab ── */
.phase-card{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.phase-hdr{padding:14px 16px;font-size:16px;font-weight:700;line-height:1.3}
.ph1-hdr{background:#e8f5e9;color:#1b5e20}
.ph2-hdr{background:#e3f2fd;color:#0d47a1}
.ph3-hdr{background:#fce4ec;color:#880e4f}
.ph4-hdr{background:#fff3e0;color:#bf360c}
.phase-body{padding:10px 16px 14px}
.pi{font-size:14px;padding:7px 0;border-bottom:1px solid var(--border);line-height:1.4}
.pi:last-child{border-bottom:none}
.pi-warn{color:var(--red);font-weight:600}
.pi-amber{color:var(--amber);font-weight:600}

/* ── RPE table ── */
table.rpe-tbl{border-collapse:collapse;width:100%;font-size:14px}
.rpe-tbl th{background:#f2f2f7;padding:10px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.rpe-tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.rpe-tbl tr:last-child td{border-bottom:none}
.rpe-7{color:var(--accent);font-weight:700}
.rpe-75{color:var(--amber);font-weight:700}
.rpe-red{color:var(--red);font-weight:700}

/* ── Progression tab ── */
table.prog-tbl{border-collapse:collapse;width:100%;font-size:14px}
.prog-tbl th{background:#f2f2f7;padding:10px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.prog-tbl td{padding:10px 14px;border-bottom:1px solid var(--border)}
.prog-tbl tr:last-child td{border-bottom:none}
.prog-tbl td:last-child{text-align:right;font-weight:600;color:var(--accent)}
.rule-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.5}
.rule-row:last-child{border-bottom:none}
.red-flag{color:var(--red);font-weight:600}

/* ── DNA card ── */
.dna-card{background:var(--amber-bg);border:1.5px solid #ffd070;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.dna-title{font-size:12px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.dna-item{font-size:14px;padding:5px 0;line-height:1.4;display:flex;gap:8px}
.dna-item::before{content:"⚑";color:var(--amber);flex-shrink:0;margin-top:1px}

/* ── Settings ── */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);min-height:54px;gap:8px}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:15px;font-weight:500}
.setting-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.setting-val{font-size:14px;color:var(--text-secondary);text-align:right}
input[type=date].date-input{height:44px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;min-width:156px;-webkit-appearance:none}
input[type=date].date-input:focus{outline:none;border-color:var(--accent)}

/* ── Print ── */
@media print{
  .tab-bar,.btn,#tab-log .export-row{display:none!important}
  .tab-pane{display:block!important;padding:0}
  .session-body{display:block!important}
  body{padding:0;background:#fff}
  .card,.session-card,.phase-card{box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>

<!-- ═══════════════════ TAB PANES ═══════════════════ -->

<div id="tab-today" class="tab-pane active">
  <div id="today-inner"></div>
</div>

<div id="tab-log" class="tab-pane">
  <div id="log-inner"></div>
</div>

<div id="tab-schedule" class="tab-pane">
  <div id="schedule-inner"></div>
</div>

<div id="tab-progression" class="tab-pane">
  <div id="progression-inner"></div>
</div>

<div id="tab-settings" class="tab-pane">
  <div id="settings-inner"></div>
</div>

<!-- ═══════════════════ TAB BAR ═══════════════════ -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tbtn-today" onclick="goTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Today
  </button>
  <button class="tab-btn" id="tbtn-log" onclick="goTab('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Log
  </button>
  <button class="tab-btn" id="tbtn-schedule" onclick="goTab('schedule')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Schedule
  </button>
  <button class="tab-btn" id="tbtn-progression" onclick="goTab('progression')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progression
  </button>
  <button class="tab-btn" id="tbtn-settings" onclick="goTab('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Settings
  </button>
</nav>

<script>
// ════════════════════════════════════════════════════
//  CONSTANTS & DATA
// ════════════════════════════════════════════════════

const PFX = 'workout_';

// Day 1–7 in cycle
const DAY_TYPES = ['Push','Pull','Mobility A','Lower/Core','Mobility B','Push','Rest'];

const WORKOUTS = {
  Push: {
    warmup: [
      'Band pull aparts — 2×15',
      'Arm circles forward & backward — 20 each direction',
      'Light DB press — 1×15 @ 40% working weight',
      'Wall slides — 2×10'
    ],
    exercises: [
      { name:'DB bench press',           sets:3, reps:'12',    warning:null },
      { name:'Incline DB bench press',   sets:3, reps:'10',    warning:null },
      { name:'Overhead DB press',        sets:3, reps:'10',    warning:'RPE cap: 7 always' },
      { name:'Lateral raise',            sets:3, reps:'12–15', warning:null },
      { name:'Overhead triceps extension',sets:3,reps:'10',    warning:null }
    ]
  },
  Pull: {
    warmup: [
      'Band pull aparts — 2×15',
      'Cat-cow — 1×10',
      'Light DB row — 1×15 @ 40% working weight'
    ],
    exercises: [
      { name:'One-arm DB row (bench supported)', sets:3, reps:'12', warning:null },
      { name:'Seal row (chest supported)',        sets:3, reps:'10', warning:null },
      { name:'Hammer curl',                       sets:3, reps:'10', warning:null },
      { name:'Incline DB curl',                   sets:3, reps:'8',  warning:null }
    ]
  },
  'Mobility A': {
    checklistOnly: true,
    items: [
      'Hip flexor stretch (kneeling) — 2×60s',
      'Thoracic rotation (cat-cow side) — 2×10',
      'Wall slide — 2×10',
      'Zone 2 walk — 20–30 min (optional)'
    ]
  },
  'Lower/Core': {
    warmup: ['Bodyweight BSS — 1×8 each leg (warm-up only)'],
    exercises: [
      { name:'Bulgarian split squat', sets:3, reps:'8',  warning:'RPE cap: 7.5 always. Stop if knee tracks inward.' },
      { name:'Romanian deadlift',     sets:3, reps:'12', warning:null },
      { name:'Goblet squat',          sets:3, reps:'10', warning:null },
      { name:'Weighted Russian twist',sets:3, reps:'12', warning:null },
      { name:'Dead bugs',             sets:3, reps:'12', warning:null }
    ]
  },
  'Mobility B': {
    checklistOnly: true,
    items: [
      'Side plank — 2×20s each side',
      "Farmer's carry — 2×45s",
      'Hip flexor stretch — 2×60s',
      'Thoracic rotation — 2×10',
      'Dead hang — 2×20s',
      'Zone 2 walk — 20–30 min'
    ]
  },
  Rest: { rest: true }
};

// ════════════════════════════════════════════════════
//  STORAGE HELPERS
// ════════════════════════════════════════════════════

function ls(key, val) {
  const k = PFX + key;
  if (val === undefined) {
    try { return JSON.parse(localStorage.getItem(k)); } catch { return null; }
  }
  localStorage.setItem(k, JSON.stringify(val));
}

function getSessions()        { return ls('sessions') || []; }
function saveSessions(v)      { ls('sessions', v); }
function getDraft()           { return ls('draft') || {}; }
function saveDraft(v)         { ls('draft', v); }
function getStartDate()       { return ls('startDate') || null; }

// ════════════════════════════════════════════════════
//  DATE / CYCLE HELPERS
// ════════════════════════════════════════════════════

function localDateStr(d) {
  const dd = d || new Date();
  return dd.getFullYear() + '-' +
    String(dd.getMonth()+1).padStart(2,'0') + '-' +
    String(dd.getDate()).padStart(2,'0');
}

function parseLocal(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function daysBetween(startStr, endStr) {
  return Math.floor((parseLocal(endStr) - parseLocal(startStr)) / 86400000);
}

function getCycleInfo(dateStr) {
  const start = getStartDate();
  if (!start) return null;
  const days = daysBetween(start, dateStr);
  if (days < 0) return null;
  const cycleDay  = (days % 7) + 1;          // 1–7
  const weekNum   = Math.floor(days / 7) + 1;
  const phase     = weekNum <= 6 ? 1 : weekNum <= 13 ? 2 : weekNum <= 20 ? 3 : 4;
  const dayType   = DAY_TYPES[cycleDay - 1];
  return { cycleDay, weekNum, phase, dayType };
}

function fmtDate(dateStr, opts) {
  return parseLocal(dateStr).toLocaleDateString('en-GB', opts || { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function typeBadgeClass(t) {
  if (t === 'Push')        return 'badge-push';
  if (t === 'Pull')        return 'badge-pull';
  if (t.includes('Mobil')) return 'badge-mob';
  if (t === 'Lower/Core')  return 'badge-lower';
  return 'badge-rest';
}

// ════════════════════════════════════════════════════
//  TAB SWITCHING
// ════════════════════════════════════════════════════

const TABS = ['today','log','schedule','progression','settings'];

function goTab(tab) {
  TABS.forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('tbtn-'+t).classList.toggle('active', t===tab);
  });
  window.scrollTo(0, 0);
  renderTab(tab);
}

function renderTab(tab) {
  ({ today:renderToday, log:renderLog, schedule:renderSchedule,
     progression:renderProgression, settings:renderSettings })[tab]();
}

// ════════════════════════════════════════════════════
//  TODAY TAB
// ════════════════════════════════════════════════════

function renderToday() {
  const el = document.getElementById('today-inner');
  const today = localDateStr();
  const info  = getCycleInfo(today);

  if (!info) {
    el.innerHTML = `
      <div class="ph"><div class="ph-title">Today</div></div>
      <div class="card" style="text-align:center;padding:32px 16px">
        <div style="font-size:52px;margin-bottom:14px">📅</div>
        <div style="font-size:19px;font-weight:700;margin-bottom:8px">Set your start date</div>
        <div style="font-size:14px;color:var(--text-secondary);margin-bottom:22px">Go to Settings to configure your program start date and unlock your daily workout.</div>
        <button class="btn btn-primary" style="max-width:220px;margin:0 auto" onclick="goTab('settings')">Open Settings</button>
      </div>`;
    return;
  }

  const { cycleDay, weekNum, phase, dayType } = info;
  const workout  = WORKOUTS[dayType];
  const sessions = getSessions();
  const todaySession = sessions.find(s => s.date === today);

  let h = `
    <div class="ph">
      <div class="ph-title">Today</div>
      <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        <span class="badge badge-blue">Day ${cycleDay} · ${dayType}</span>
        <span class="badge badge-gray">Week ${weekNum} · Phase ${phase}</span>
      </div>
      <div class="ph-sub" style="margin-top:6px">${fmtDate(today)}</div>
    </div>`;

  if (todaySession) {
    const t = new Date(todaySession.completedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    h += `
      <div class="complete-banner">
        <div class="cb-icon">✅</div>
        <div><div class="cb-text">Session logged at ${t}</div><div class="cb-sub">Tap below to update if needed</div></div>
      </div>`;
  }

  if (workout.rest) {
    h += `
      <div class="rest-screen">
        <div class="rest-icon">😴</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">Recovery is where adaptation happens.<br>Hydrate. Sleep. Let the gains arrive.</div>
      </div>`;
    if (!todaySession) {
      h += `<button class="btn btn-primary" onclick="markComplete('${today}','Rest',[])">Log Rest Day</button>`;
    }

  } else if (workout.checklistOnly) {
    h += `<div class="card"><div class="card-title">${dayType}</div><ul class="checklist">`;
    workout.items.forEach((item, i) => {
      h += `<li class="cl-item" id="cli-${i}">
        <input type="checkbox" id="clchk-${i}" onchange="toggleCL(${i},'cli-')">
        <label for="clchk-${i}">${item}</label></li>`;
    });
    h += `</ul></div>
      <button class="btn btn-primary" onclick="markComplete('${today}','${dayType}',[])">Mark Complete ✓</button>`;

  } else {
    // Warm-up
    if (workout.warmup && workout.warmup.length) {
      h += `<div class="card"><div class="card-title">Warm-Up</div><ul class="checklist">`;
      workout.warmup.forEach((item, i) => {
        h += `<li class="cl-item" id="wu-${i}">
          <input type="checkbox" id="wuchk-${i}" onchange="toggleCL(${i},'wu-')">
          <label for="wuchk-${i}">${item}</label></li>`;
      });
      h += `</ul></div>`;
    }

    // Exercises
    const draft    = getDraft();
    const dKey     = today + '|' + dayType;
    const draftDay = draft[dKey] || {};

    h += `<div class="card"><div class="card-title">Exercises</div>`;
    workout.exercises.forEach((ex, ei) => {
      if (ei > 0) h += `<div class="ex-divider"></div>`;
      h += `<div class="ex-block">
        <div class="ex-header">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">Target: ${ex.reps} reps per set</div>
          ${ex.warning ? `<div class="warn-label">⚠ ${ex.warning}</div>` : ''}
        </div>
        <div class="tbl-wrap"><table class="log-tbl">
          <colgroup><col class="c-set"><col class="c-kg"><col class="c-rep"><col class="c-rep"><col class="c-rep"><col class="c-note"></colgroup>
          <thead><tr><th>Set</th><th>kg</th><th>Rep 1</th><th>Rep 2</th><th>Rep 3</th><th>Note</th></tr></thead>
          <tbody>`;

      const baseRep = ex.reps.split('–')[0];
      for (let s = 1; s <= ex.sets; s++) {
        const sk = ei + '_' + s;
        const sd = draftDay[sk] || {};
        h += `<tr>
          <td>${s}</td>
          <td><input type="number" inputmode="decimal" placeholder="kg" value="${esc(sd.kg||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'kg',this.value)"></td>
          <td><input type="number" inputmode="numeric" placeholder="${baseRep}" value="${esc(sd.r1||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'r1',this.value)"></td>
          <td><input type="number" inputmode="numeric" placeholder="${baseRep}" value="${esc(sd.r2||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'r2',this.value)"></td>
          <td><input type="number" inputmode="numeric" placeholder="${baseRep}" value="${esc(sd.r3||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'r3',this.value)"></td>
          <td><input type="text" placeholder="note" value="${esc(sd.note||'')}" class="note-inp"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'note',this.value)"></td>
        </tr>`;
      }
      h += `</tbody></table></div></div>`;
    });
    h += `</div>`;

    // Mark complete button — reads draft at click time
    const dtSafe = dayType.replace(/'/g,"\\'");
    h += `<button class="btn btn-primary" onclick="markCompleteExercise('${today}','${dtSafe}')">Mark Complete ✓</button>`;
    h += `<div style="height:8px"></div>`;
  }

  el.innerHTML = h;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function toggleCL(i, prefix) {
  const li  = document.getElementById(prefix + i);
  const chk = document.getElementById((prefix==='cli-'?'clchk-':'wuchk-') + i);
  li.classList.toggle('done', chk.checked);
}

function upDraft(date, dayType, ei, s, field, val) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  const sk = ei + '_' + s;
  if (!draft[dKey][sk]) draft[dKey][sk] = {};
  draft[dKey][sk][field] = val;
  saveDraft(draft);
}

function collectExercises(date, dayType) {
  const draft    = getDraft();
  const dKey     = date + '|' + dayType;
  const draftDay = draft[dKey] || {};
  const workout  = WORKOUTS[dayType];
  if (!workout || !workout.exercises) return [];
  return workout.exercises.map((ex, ei) => {
    const sets = [];
    for (let s = 1; s <= ex.sets; s++) {
      const sd = draftDay[ei+'_'+s] || {};
      sets.push({ set:s, kg:sd.kg||'', r1:sd.r1||'', r2:sd.r2||'', r3:sd.r3||'', note:sd.note||'' });
    }
    return { name: ex.name, sets };
  });
}

function markCompleteExercise(date, dayType) {
  const exercises = collectExercises(date, dayType);
  markComplete(date, dayType, exercises);
}

function markComplete(date, dayType, exercises) {
  if (!confirm(`Mark ${dayType} session as complete?`)) return;

  const sessions = getSessions();
  const idx = sessions.findIndex(s => s.date === date);
  const session = { id: Date.now(), date, dayType, exercises, completedAt: new Date().toISOString() };

  if (idx >= 0) sessions[idx] = session; else sessions.push(session);
  saveSessions(sessions);

  const draft = getDraft();
  delete draft[date + '|' + dayType];
  saveDraft(draft);

  const btn = document.querySelector('#tab-today .btn-primary');
  if (btn) {
    btn.textContent = 'Saved! ✓';
    btn.className = 'btn btn-success';
    setTimeout(() => renderToday(), 1200);
  }
}

          h += `<div class="sess-ex">

              <td>${esc(st.note||'')}</td></tr>`;
          });
          h += `</tbody></table></div>`;
        });

        h += `<div style="padding-top:12px;font-size:14px;color:var(--text-secondary)">${sess.dayType} session — no exercise sets recorded</div>`;
      }

function toggleSess(idx) {
  const body = document.getElementById('sbody-'+idx);
  const chev = document.getElementById('schev-'+idx);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function exportWeek() {
  const now   = new Date();
  const wkDay = now.getDay(); // 0=Sun
  const wkStart = new Date(now); wkStart.setDate(now.getDate() - wkDay);
  const wkEnd   = new Date(wkStart); wkEnd.setDate(wkStart.getDate() + 6);
  const wsStr = localDateStr(wkStart);
  const weStr = localDateStr(wkEnd);

  const sessions = getSessions().filter(s => s.date >= wsStr && s.date <= weStr);

  let doc = `<!DOCTYPE html><html><head><title>Workout Log</title>
  <style>
    body{font-family:sans-serif;max-width:720px;margin:40px auto;color:#111}
    h1{font-size:22px;margin-bottom:4px}
    .sub{color:#666;font-size:14px;margin-bottom:24px}
    h2{font-size:17px;margin:28px 0 4px;padding-bottom:6px;border-bottom:2px solid #222}
    h3{font-size:14px;font-weight:600;margin:14px 0 4px;color:#444}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px}
    th,td{border:1px solid #ccc;padding:6px 8px;text-align:center}
    th{background:#f5f5f5;font-weight:600}
    td:last-child{text-align:left}
    .no-sessions{color:#666;font-style:italic}
  </style></head><body>
  <h1>Workout Log — Weekly Export</h1>
  <div class="sub">${fmtDate(wsStr,{day:'numeric',month:'long',year:'numeric'})} – ${fmtDate(weStr,{day:'numeric',month:'long',year:'numeric'})}</div>`;

  if (!sessions.length) {
    doc += `<p class="no-sessions">No sessions logged this week.</p>`;
  } else {
    sessions.forEach(s => {
      doc += `<h2>${fmtDate(s.date,{weekday:'long',day:'numeric',month:'long'})} — ${s.dayType}</h2>`;
      if (s.exercises && s.exercises.length && s.exercises[0].sets) {
        s.exercises.forEach(ex => {
          doc += `<h3>${ex.name}</h3>
            <table><tr><th>Set</th><th>kg</th><th>Rep 1</th><th>Rep 2</th><th>Rep 3</th><th>Note</th></tr>`;
          ex.sets.forEach(st => {
            doc += `<tr><td>${st.set}</td><td>${st.kg||'—'}</td><td>${st.r1||'—'}</td><td>${st.r2||'—'}</td><td>${st.r3||'—'}</td><td>${st.note||''}</td></tr>`;
          });
          doc += `</table>`;
        });
      }
    });
  }

  doc += `</body></html>`;

  const pw = window.open('','_blank');
  pw.document.write(doc);
  pw.document.close();
  pw.print();
}

  alert('All data cleared.');
}
