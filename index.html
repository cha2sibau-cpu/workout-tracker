<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Workout Tracker</title>
<style>
:root {
  --bg: #f2f2f7;
  --card: #ffffff;
  --border: #d1d1d6;
  --text: #1c1c1e;
  --text-secondary: #6e6e73;
  --accent: #007aff;
  --accent-light: #e8f0fe;
  --red: #ff3b30;
  --red-bg: #fff2f1;
  --amber: #ff9500;
  --amber-bg: #fff8ec;
  --green: #34c759;
  --green-bg: #f0fff4;
  --tab-h: 83px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--tab-h) + var(--safe-bottom));-webkit-font-smoothing:antialiased}

/* ── Tab bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;padding-bottom:var(--safe-bottom);z-index:999}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:6px 4px;cursor:pointer;color:var(--text-secondary);font-size:10px;font-weight:500;min-height:44px;transition:color .15s}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:24px;height:24px;stroke-width:1.8}

/* ── Layout ── */
.tab-pane{display:none;padding:0 16px 24px;max-width:820px;margin:0 auto}
.tab-pane.active{display:block}

/* ── Page header ── */
.ph{padding:20px 0 10px}
.ph-title{font-size:30px;font-weight:700;letter-spacing:-.5px}
.ph-sub{font-size:14px;color:var(--text-secondary);margin-top:3px}

/* ── Card ── */
.card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:17px;font-weight:600;margin-bottom:12px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:600}
.badge-blue{background:var(--accent-light);color:var(--accent)}
.badge-gray{background:#f2f2f7;color:var(--text-secondary);font-size:12px}
.badge-green{background:#e8f9ee;color:#1a7f3c}
.badge-push{background:#e8f5e9;color:#2e7d32}
.badge-pull{background:#e3f2fd;color:#1565c0}
.badge-mob{background:#f3e5f5;color:#6a1b9a}
.badge-lower{background:#fff3e0;color:#e65100}
.badge-rest{background:#f5f5f5;color:#616161}

/* ── Section label ── */
.sec-label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px}

/* ── Checklist ── */
.checklist{list-style:none}
.cl-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:48px;user-select:none}
.cl-item:last-child{border-bottom:none}
.cl-item input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.cl-item label{font-size:15px;cursor:pointer;flex:1;line-height:1.4}
.cl-item.done label{text-decoration:line-through;color:var(--text-secondary)}

/* ── Warning label ── */
.warn-label{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--red);background:var(--red-bg);padding:4px 9px;border-radius:8px;flex-shrink:0;line-height:1.3;margin-top:4px}

/* ── Exercise block ── */
.ex-block{margin-bottom:20px}
.ex-block:last-child{margin-bottom:0}
.ex-header{margin-bottom:8px}
.ex-name{font-size:16px;font-weight:600;line-height:1.3}
.ex-target{font-size:12px;color:var(--text-secondary);margin-top:2px}
.ex-divider{height:1px;background:var(--border);margin:16px 0}

/* ── Recommendation badge ── */
.rec-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;font-size:12px;font-weight:600;margin-top:5px}
.rec-up{background:#e8f9ee;color:#1a7f3c}
.rec-same{background:var(--accent-light);color:var(--accent)}
.rec-down{background:var(--red-bg);color:var(--red)}
.rec-new{background:#f2f2f7;color:var(--text-secondary)}
.last-sess{font-size:11px;color:var(--text-secondary);margin-top:3px;padding-left:1px}

/* ── Previous session note ── */
.prev-note{background:#fffbe6;border:1px solid #ffe066;border-radius:9px;padding:7px 10px;margin-top:7px;font-size:12px;color:#7a6000;line-height:1.5}

/* ── Log table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px}
table.log-tbl{border-collapse:collapse;min-width:420px;width:100%}
.log-tbl th{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;padding:5px 4px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
.log-tbl th:first-child{text-align:left;width:30px;padding-left:0}
.log-tbl td{padding:3px 3px;text-align:center;vertical-align:middle}
.log-tbl td:first-child{font-size:13px;font-weight:600;color:var(--text-secondary);text-align:left;padding-left:0}
.log-tbl input{width:100%;min-height:46px;border:1.5px solid var(--border);border-radius:9px;padding:4px 5px;font-size:15px;text-align:center;background:var(--bg);color:var(--text);font-family:inherit;transition:border-color .15s,background .15s;-webkit-appearance:none}
.log-tbl input:focus{outline:none;border-color:var(--accent);background:var(--accent-light)}
.log-tbl input.note-inp{text-align:left;font-size:13px}
.log-tbl col.c-set{width:30px}
.log-tbl col.c-kg{width:62px}
.log-tbl col.c-reps{width:58px}
.log-tbl col.c-rpe{width:54px}
.log-tbl col.c-note{width:auto;min-width:80px}

/* ── Farmer carry weight input ── */
.carry-kg-inp{display:inline-block;width:70px;min-height:36px;border:1.5px solid var(--border);border-radius:8px;padding:4px 6px;font-size:14px;text-align:center;background:var(--bg);color:var(--text);font-family:inherit;margin-left:8px;vertical-align:middle;-webkit-appearance:none}
.carry-kg-inp:focus{outline:none;border-color:var(--accent);background:var(--accent-light)}
.carry-hint{font-size:11px;color:var(--text-secondary);padding:2px 0 6px 34px}

/* ── Buttons ── */
.btn{display:block;width:100%;min-height:52px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit}
.btn:active{opacity:.78;transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--accent);color:var(--accent);font-size:15px;min-height:46px}
.btn-sm{min-height:44px;font-size:14px;border-radius:11px}
.btn + .btn{margin-top:10px}

/* ── Completion banner ── */
.complete-banner{background:var(--green-bg);border:1.5px solid var(--green);border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.complete-banner .cb-icon{font-size:24px}
.complete-banner .cb-text{font-size:15px;font-weight:600;color:#1a7f3c}
.complete-banner .cb-sub{font-size:13px;color:#2d9e52}

/* ── Rest screen ── */
.rest-screen{text-align:center;padding:50px 20px}
.rest-icon{font-size:72px;margin-bottom:18px}
.rest-title{font-size:26px;font-weight:700;margin-bottom:8px}
.rest-sub{font-size:16px;color:var(--text-secondary);line-height:1.5}

/* ── Log tab ── */
.session-card{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.session-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;min-height:56px;gap:8px}
.session-date{font-weight:600;font-size:15px}
.session-meta{font-size:12px;color:var(--text-secondary);margin-top:2px}
.session-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.session-chev{color:var(--text-secondary);font-size:14px;transition:transform .2s}
.session-chev.open{transform:rotate(180deg)}
.session-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.session-body.open{display:block}
.sess-ex{margin-top:14px}
.sess-ex-name{font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
table.view-tbl{border-collapse:collapse;width:100%;font-size:13px}
.view-tbl th{color:var(--text-secondary);font-weight:500;text-align:center;padding:5px 6px;font-size:11px;border-bottom:1px solid var(--border)}
.view-tbl th:first-child{text-align:left}
.view-tbl td{text-align:center;padding:5px 6px;border-bottom:1px solid var(--border)}
.view-tbl td:first-child{text-align:left;font-weight:600}
.view-tbl tr:last-child td{border-bottom:none}
.view-tbl td:last-child{text-align:left;color:var(--text-secondary);font-size:12px}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--text-secondary)}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px}

/* ── Schedule tab ── */
.phase-card{background:var(--card);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.phase-hdr{padding:14px 16px;font-size:16px;font-weight:700;line-height:1.3}
.ph1-hdr{background:#e8f5e9;color:#1b5e20}
.ph2-hdr{background:#e3f2fd;color:#0d47a1}
.ph3-hdr{background:#fce4ec;color:#880e4f}
.ph4-hdr{background:#fff3e0;color:#bf360c}
.phase-body{padding:10px 16px 14px}
.pi{font-size:14px;padding:7px 0;border-bottom:1px solid var(--border);line-height:1.4}
.pi:last-child{border-bottom:none}
.pi-warn{color:var(--red);font-weight:600}
.pi-amber{color:var(--amber);font-weight:600}

/* ── RPE table ── */
table.rpe-tbl{border-collapse:collapse;width:100%;font-size:14px}
.rpe-tbl th{background:#f2f2f7;padding:10px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.rpe-tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.rpe-tbl tr:last-child td{border-bottom:none}
.rpe-7{color:var(--accent);font-weight:700}
.rpe-75{color:var(--amber);font-weight:700}
.rpe-red{color:var(--red);font-weight:700}

/* ── Progression tab ── */
table.prog-tbl{border-collapse:collapse;width:100%;font-size:14px}
.prog-tbl th{background:#f2f2f7;padding:10px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.prog-tbl td{padding:10px 14px;border-bottom:1px solid var(--border)}
.prog-tbl tr:last-child td{border-bottom:none}
.prog-tbl td:last-child{text-align:right;font-weight:600;color:var(--accent)}
.rule-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.5}
.rule-row:last-child{border-bottom:none}
.red-flag{color:var(--red);font-weight:600}

/* ── DNA card ── */
.dna-card{background:var(--amber-bg);border:1.5px solid #ffd070;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.dna-title{font-size:12px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.dna-item{font-size:14px;padding:5px 0;line-height:1.4;display:flex;gap:8px}
.dna-item::before{content:"⚑";color:var(--amber);flex-shrink:0;margin-top:1px}

/* ── Settings ── */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);min-height:54px;gap:8px}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:15px;font-weight:500}
.setting-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.setting-val{font-size:14px;color:var(--text-secondary);text-align:right}
input[type=date].date-input{height:44px;border:1.5px solid var(--border);border-radius:10px;padding:0 12px;font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;min-width:156px;-webkit-appearance:none}
input[type=date].date-input:focus{outline:none;border-color:var(--accent)}

/* ── Log view toggle ── */
.view-toggle{display:flex;gap:6px;margin-bottom:14px}
.vt-btn{flex:1;min-height:40px;border:1.5px solid var(--accent);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;background:transparent;color:var(--accent)}
.vt-btn.active{background:var(--accent);color:#fff}

/* ── Export row ── */
.export-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.export-sel{flex:1;min-width:0;height:44px;border:1.5px solid var(--border);border-radius:11px;padding:0 12px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit}
.export-sel:focus{outline:none;border-color:var(--accent)}

/* ── Print ── */
@media print{
  .tab-bar,.btn,#tab-log .export-row,#tab-log .view-toggle{display:none!important}
  .tab-pane{display:block!important;padding:0}
  .session-body{display:block!important}
  body{padding:0;background:#fff}
  .card,.session-card,.phase-card{box-shadow:none;border:1px solid #ccc}
}
</style>
</head>
<body>

<!-- ═══════════════════ TAB PANES ═══════════════════ -->

<div id="tab-today" class="tab-pane active">
  <div id="today-inner"></div>
</div>

<div id="tab-log" class="tab-pane">
  <div id="log-inner"></div>
</div>

<div id="tab-schedule" class="tab-pane">
  <div id="schedule-inner"></div>
</div>

<div id="tab-progression" class="tab-pane">
  <div id="progression-inner"></div>
</div>

<div id="tab-settings" class="tab-pane">
  <div id="settings-inner"></div>
</div>

<!-- ═══════════════════ TAB BAR ═══════════════════ -->
<nav class="tab-bar">
  <button class="tab-btn active" id="tbtn-today" onclick="goTab('today')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Today
  </button>
  <button class="tab-btn" id="tbtn-log" onclick="goTab('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Log
  </button>
  <button class="tab-btn" id="tbtn-schedule" onclick="goTab('schedule')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Schedule
  </button>
  <button class="tab-btn" id="tbtn-progression" onclick="goTab('progression')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Progression
  </button>
  <button class="tab-btn" id="tbtn-settings" onclick="goTab('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Settings
  </button>
</nav>

<script>
// ════════════════════════════════════════════════════
//  CONSTANTS & DATA
// ════════════════════════════════════════════════════

const PFX = 'workout_';

const DAY_TYPES = ['Pull','Mobility A','Lower/Core','Mobility B','Push','Rest','Push'];

const WORKOUTS = {
  Push: {
    warmup: [
      'Band pull aparts — 2×15',
      'Arm circles forward & backward — 20 each direction',
      'Light DB press — 1×15 @ 40% working weight',
      'Wall slides — 2×10'
    ],
    exercises: [
      { name:'DB bench press',           reps:'12',    warning:null },
      { name:'Incline DB bench press',   reps:'10',    warning:null },
      { name:'Overhead DB press',        reps:'10',    warning:'RPE cap: 7 always' },
      { name:'Lateral raise',            reps:'12–15', warning:null },
      { name:'Overhead triceps extension',reps:'10',   warning:null }
    ]
  },
  Pull: {
    warmup: [
      'Band pull aparts — 2×15',
      'Dead hang — 1×20s',
      'Scapular retraction (wall) — 2×10',
      'Light DB row — 1×15 @ 40% working weight'
    ],
    exercises: [
      { name:'One-arm DB row (bench supported)', reps:'12', warning:null },
      { name:'Seal row (chest supported)',        reps:'10', warning:null },
      { name:'Hammer curl',                       reps:'8',  warning:null },
      { name:'Incline DB curl',                   reps:'8',  warning:null },
      { name:'Reverse fly (bench supported)',     reps:'10', warning:null },
      { name:'Face pulls',                        reps:'15', warning:null }
    ]
  },
  'Mobility A': {
    checklistOnly: true,
    items: [
      'Hip flexor stretch (kneeling) — 2×60s',
      'Thoracic rotation (cat-cow side) — 2×10',
      'Wall slide — 2×10',
      'Zone 2 walk — 20–30 min (optional)'
    ]
  },
  'Lower/Core': {
    warmup: [
      'Hip circles — 2×10 each direction',
      'Glute bridge — 1×10',
      'Hip flexor stretch — 30s each side',
      'Bodyweight BSS — 1×8 each leg (warm-up only)'
    ],
    exercises: [
      { name:'Bulgarian split squat', reps:'8',  warning:'RPE cap: 7.5 always. Stop if knee tracks inward.' },
      { name:'Romanian deadlift',     reps:'12', warning:null },
      { name:'Goblet squat',          reps:'10', warning:null },
      { name:'Weighted Russian twist',reps:'12', warning:null },
      { name:'Dead bugs',             reps:'12', warning:null }
    ]
  },
  'Mobility B': {
    checklistOnly: true,
    items: [
      'Side plank — 2×20s each side',
      "Farmer's carry — 2×45s",
      'Hip flexor stretch — 2×60s',
      'Thoracic rotation — 2×10',
      'Dead hang — 2×20s',
      'Zone 2 walk — 20–30 min'
    ]
  },
  Rest: { rest: true }
};

// ════════════════════════════════════════════════════
//  LOG VIEW STATE
// ════════════════════════════════════════════════════

let logView = 'list';

// ════════════════════════════════════════════════════
//  PHASE & EXERCISE HELPERS
// ════════════════════════════════════════════════════

function parseSets(itemText) {
  const m = itemText.match(/(\d+)[×x]/i);
  return m ? parseInt(m[1]) : 1;
}

function parseItem(itemText) {
  const sep = itemText.indexOf(' — ');
  if (sep === -1) return { name: itemText, sets: 1, detail: '' };
  const name = itemText.slice(0, sep);
  const rest = itemText.slice(sep + 3);
  const m = rest.match(/^(\d+)[×x](.+)$/i);
  if (m) return { name, sets: parseInt(m[1]), detail: m[2] };
  return { name, sets: 1, detail: rest };
}

function getPhaseExercises(dayType, phase) {
  return WORKOUTS[dayType];
}

// Returns how many sets for this exercise at current phase
function getSetsForPhase(exerciseName, phase) {
  if (phase >= 4) return 2;
  if (phase === 3) return 4;
  if (phase === 2) {
    const fourSet = [
      'DB bench press','One-arm DB row (bench supported)','Seal row (chest supported)',
      'Romanian deadlift','Goblet squat','Bulgarian split squat',
      'Lateral raise','Reverse fly (bench supported)','Face pulls'
    ];
    return fourSet.includes(exerciseName) ? 4 : 3;
  }
  return 3; // Phase 1
}

// Weight increment per exercise type for progressive overload recommendations
function getWeightIncrement(exerciseName) {
  if (exerciseName === 'Overhead DB press') return 1;
  const isolation = [
    'Lateral raise','Hammer curl','Incline DB curl',
    'Reverse fly (bench supported)','Overhead triceps extension',
    'Weighted Russian twist','Face pulls'
  ];
  if (isolation.includes(exerciseName)) return 1;
  return 2.5;
}

// Returns recommendation object based on previous sessions
function getExerciseRecommendation(exerciseName, targetRepsStr, phase) {
  const sessions = getSessions().slice().reverse();
  for (const sess of sessions) {
    if (!sess.exercises) continue;
    const ex = sess.exercises.find(e => e.name === exerciseName);
    if (!ex || !ex.sets || !ex.sets.length) continue;

    // Normalize sets to { kg, reps, rpe } regardless of old/new format
    let allSets = [];
    const firstSet = ex.sets[0];
    if (firstSet.reps !== undefined) {
      // New format: each row is one set
      allSets = ex.sets.map(s => ({ kg: s.kg, reps: s.reps, rpe: s.rpe }));
    } else if (firstSet.r1 !== undefined) {
      // Old format: r1/r2/r3 are the three sets within one row
      const s = firstSet;
      if (s.r1) allSets.push({ kg: s.kg, reps: s.r1, rpe: s.rpe });
      if (s.r2) allSets.push({ kg: s.kg, reps: s.r2, rpe: s.rpe });
      if (s.r3) allSets.push({ kg: s.kg, reps: s.r3, rpe: s.rpe });
    }

    const filledSets = allSets.filter(s => s.reps && String(s.reps).trim());
    if (!filledSets.length) continue;

    const parts = targetRepsStr.split('–');
    const bottomTarget = parseInt(parts[0]);
    const topTarget = parts.length > 1 ? parseInt(parts[1]) : bottomTarget;

    const avgReps = filledSets.reduce((sum, s) => sum + (parseInt(s.reps) || 0), 0) / filledSets.length;
    const rpeVals = filledSets.map(s => parseFloat(s.rpe)).filter(r => !isNaN(r));
    const avgRPE = rpeVals.length ? rpeVals.reduce((a, b) => a + b, 0) / rpeVals.length : null;
    const lastKg = parseFloat(allSets.find(s => s.kg)?.kg) || 0;

    // Build last session summary
    const repsDisplay = filledSets.map(s => s.reps).join('/');
    const kgDisplay = lastKg > 0 ? lastKg + ' kg · ' : '';
    const rpeDisplay = avgRPE !== null ? ' · RPE ' + avgRPE.toFixed(1).replace(/\.0$/, '') : '';
    const lastSummary = `${kgDisplay}${repsDisplay} reps${rpeDisplay}`;

    const recSets = getSetsForPhase(exerciseName, phase);
    const inc = getWeightIncrement(exerciseName);
    let recKg = lastKg;
    let dir = 'same';
    let msg = 'On track — maintain weight';

    const gapFromBottom = bottomTarget - avgReps;
    if (lastKg <= 0) {
      dir = 'new';
      msg = 'No prior weight — start light';
    } else if (avgReps >= topTarget && (avgRPE === null || avgRPE <= 7.5)) {
      recKg = lastKg + inc;
      dir = 'up';
      msg = 'Hit top of range at low RPE → increase';
    } else if (avgReps >= topTarget) {
      recKg = lastKg + inc;
      dir = 'up';
      msg = 'Consistently hit top of rep range';
    } else if (gapFromBottom <= 1.5) {
      dir = 'same';
      msg = 'Close to target — maintain weight';
    } else {
      recKg = Math.max(0, lastKg - inc);
      dir = 'down';
      msg = 'Significantly below target reps — reduce weight';
    }

    return { sets: recSets, reps: targetRepsStr, kg: recKg, dir, msg, lastSummary };
  }
  return null;
}

// Returns notes from the most recent session for an exercise
function getPreviousNotes(exerciseName) {
  const sessions = getSessions().slice().reverse();
  for (const sess of sessions) {
    if (!sess.exercises) continue;
    const ex = sess.exercises.find(e => e.name === exerciseName);
    if (!ex || !ex.sets) continue;
    const notes = [];
    ex.sets.forEach(s => {
      if (s.note && s.note.trim()) notes.push(s.note.trim());
    });
    if (notes.length) return notes;
  }
  return [];
}

// Returns the last logged weight for farmer's carry
function getLastCarryWeight() {
  const sessions = getSessions().slice().reverse();
  for (const sess of sessions) {
    if (!sess.exercises) continue;
    const carry = sess.exercises.find(e => e.name === "Farmer's carry");
    if (!carry) continue;
    if (carry.weights) {
      const w = carry.weights.find(x => x && parseFloat(x) > 0);
      if (w) return w;
    }
  }
  return null;
}

function getLastWeight(exerciseName) {
  const sessions = getSessions().slice().reverse();
  for (const sess of sessions) {
    if (!sess.exercises) continue;
    const ex = sess.exercises.find(e => e.name === exerciseName);
    if (ex && ex.sets && ex.sets.length > 0 && ex.sets[0].kg) return ex.sets[0].kg;
  }
  return null;
}

function ls(key, val) {
  const k = PFX + key;
  if (val === undefined) {
    try { return JSON.parse(localStorage.getItem(k)); } catch { return null; }
  }
  localStorage.setItem(k, JSON.stringify(val));
}

function getSessions()        { return ls('sessions') || []; }
function saveSessions(v)      { ls('sessions', v); }
function getDraft()           { return ls('draft') || {}; }
function saveDraft(v)         { ls('draft', v); }

//  DATE / CYCLE HELPERS
// ════════════════════════════════════════════════════

function localDateStr(d) {
  const dd = d || new Date();
  return dd.getFullYear() + '-' +
    String(dd.getMonth()+1).padStart(2,'0') + '-' +
    String(dd.getDate()).padStart(2,'0');
}

function parseLocal(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function daysBetween(startStr, endStr) {
  return Math.floor((parseLocal(endStr) - parseLocal(startStr)) / 86400000);
}

function getCycleInfo(dateStr) {
  const start = getStartDate();
  if (!start) return null;
  const days = daysBetween(start, dateStr);
  if (days < 0) return null;
  const cycleDay  = (days % 7) + 1;
  const weekNum   = Math.floor(days / 7) + 1;
  const phase     = weekNum <= 6 ? 1 : weekNum <= 13 ? 2 : weekNum <= 20 ? 3 : 4;
  const dayType   = DAY_TYPES[cycleDay - 1];
  return { cycleDay, weekNum, phase, dayType };
}

function fmtDate(dateStr, opts) {
  return parseLocal(dateStr).toLocaleDateString('en-GB', opts || { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function typeBadgeClass(t) {
  if (t === 'Push')        return 'badge-push';
  if (t === 'Pull')        return 'badge-pull';
  if (t.includes('Mobil')) return 'badge-mob';
  if (t === 'Lower/Core')  return 'badge-lower';
  return 'badge-rest';
}

}

function renderToday() {
  const el = document.getElementById('today-inner');
  const today = localDateStr();
  const info  = getCycleInfo(today);

  if (!info) {
    el.innerHTML = `
      <div class="ph"><div class="ph-title">Today</div></div>
      <div class="card" style="text-align:center;padding:32px 16px">
        <div style="font-size:52px;margin-bottom:14px">📅</div>
        <div style="font-size:19px;font-weight:700;margin-bottom:8px">Set your start date</div>
        <div style="font-size:14px;color:var(--text-secondary);margin-bottom:22px">Go to Settings to configure your program start date and unlock your daily workout.</div>
        <button class="btn btn-primary" style="max-width:220px;margin:0 auto" onclick="goTab('settings')">Open Settings</button>
      </div>`;
    return;
  }

  const { cycleDay, weekNum, phase, dayType } = info;
  const workout   = getPhaseExercises(dayType, phase);
  const sessions  = getSessions();
  const todaySession = sessions.find(s => s.date === today);

  let h = `
    <div class="ph">
      <div class="ph-title">Today</div>
      <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        <span class="badge badge-blue">Day ${cycleDay} · ${dayType}</span>
        <span class="badge badge-gray">Week ${weekNum} · Phase ${phase}</span>
      </div>
      <div class="ph-sub" style="margin-top:6px">${fmtDate(today)}</div>
    </div>`;

  if (todaySession) {
    const t = new Date(todaySession.completedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    h += `
      <div class="complete-banner">
        <div class="cb-icon">✅</div>
        <div><div class="cb-text">Session logged at ${t}</div><div class="cb-sub">Tap below to update if needed</div></div>
      </div>`;
  }

  if (workout.rest) {
    h += `
      <div class="rest-screen">
        <div class="rest-icon">😴</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">Recovery is where adaptation happens.<br>Hydrate. Sleep. Let the gains arrive.</div>
      </div>`;

  } else if (workout.checklistOnly) {
    const draft    = getDraft();
    const dKey     = today + '|' + dayType;
    const draftDay = draft[dKey] || {};
    const lastCarryKg = getLastCarryWeight();

    h += `<div class="card"><div class="card-title">${dayType}</div><ul class="checklist">`;
    workout.items.forEach((item, i) => {
      const parsed = parseItem(item);
      const isCarry = parsed.name === "Farmer's carry";
      for (let r = 1; r <= parsed.sets; r++) {
        const isChecked = draftDay['mob_' + i + '_' + r] === true;
        const carryKg = draftDay['mob_' + i + '_' + r + '_kg'] || '';
        const label = parsed.sets > 1
          ? `${parsed.name} &mdash; Set ${r} <span style="color:var(--text-secondary);font-weight:400">(${parsed.detail})</span>`
          : item;

        let carryInput = '';
        if (isCarry) {
          carryInput = `<input type="number" inputmode="decimal" step="0.5"
            class="carry-kg-inp" placeholder="${lastCarryKg || 'kg'}" value="${esc(carryKg)}"
            onclick="event.stopPropagation()"
            oninput="upCarryDraft('${today}','${dayType}',${i},${r},this.value.replace(',','.'))">`;
        }

        h += `<li class="cl-item${isChecked ? ' done' : ''}" id="cli-${i}-${r}">
          <input type="checkbox" id="clchk-${i}-${r}" ${isChecked ? 'checked' : ''}
            onchange="upMobDraft('${today}','${dayType}',${i},${r},this.checked)">
          <label for="clchk-${i}-${r}">${label}</label>${carryInput}</li>`;
      }

      if (isCarry && lastCarryKg) {
        h += `<div class="carry-hint">Last carry: <strong>${lastCarryKg} kg</strong></div>`;
      }
    });
    h += `</ul></div>
      <button class="btn btn-primary" onclick="markCompleteMobility('${today}','${dayType}')">Mark Complete ✓</button>`;

  } else {
    const draft    = getDraft();
    const dKey     = today + '|' + dayType;
    const draftDay = draft[dKey] || {};

    // Warm-up
    if (workout.warmup && workout.warmup.length) {
      h += `<div class="card"><div class="card-title">Warm-Up</div><ul class="checklist">`;
      workout.warmup.forEach((item, i) => {
        const isChecked = draftDay['wu_' + i] === true;
        h += `<li class="cl-item${isChecked ? ' done' : ''}" id="wu-${i}">
          <input type="checkbox" id="wuchk-${i}" ${isChecked ? 'checked' : ''}
            onchange="upWarmupDraft('${today}','${dayType}',${i},this.checked)">
          <label for="wuchk-${i}">${item}</label></li>`;
      });
      h += `</ul></div>`;
    }

    // Exercises — one row per set
    h += `<div class="card"><div class="card-title">Exercises</div>`;
    workout.exercises.forEach((ex, ei) => {
      if (ei > 0) h += `<div class="ex-divider"></div>`;

      const numSets = getSetsForPhase(ex.name, phase);
      const rec = getExerciseRecommendation(ex.name, ex.reps, phase);
      const prevNotes = getPreviousNotes(ex.name);

      // Recommendation display
      let recHtml = '';
      if (!rec) {
        recHtml = `<div class="rec-badge rec-new">No prior data — start light</div>`;
      } else {
        const dirIcon = rec.dir === 'up' ? '↑' : rec.dir === 'down' ? '↓' : '→';
        const dirClass = rec.dir === 'up' ? 'rec-up' : rec.dir === 'down' ? 'rec-down' : rec.dir === 'new' ? 'rec-new' : 'rec-same';
        const kgText = rec.kg > 0 ? ` @ ${rec.kg} kg` : '';
        recHtml = `
          <div class="rec-badge ${dirClass}">${dirIcon} Rec: ${rec.sets}×${rec.reps}${kgText}</div>
          <div class="last-sess">Last: ${rec.lastSummary}</div>`;
      }

      // Previous session notes
      let noteHtml = '';
      if (prevNotes.length) {
        noteHtml = `<div class="prev-note">📝 Last session: ${prevNotes.map(n => `"${esc(n)}"`).join(' · ')}</div>`;
      }

      h += `<div class="ex-block">
        <div class="ex-header">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">Target: ${ex.reps} reps</div>
          ${ex.warning ? `<div class="warn-label">⚠ ${ex.warning}</div>` : ''}
          ${recHtml}${noteHtml}
        </div>
        <div class="tbl-wrap"><table class="log-tbl">
          <colgroup><col class="c-set"><col class="c-kg"><col class="c-reps"><col class="c-rpe"><col class="c-note"></colgroup>
          <thead><tr><th>Set</th><th>kg</th><th>Reps</th><th>RPE</th><th>Note</th></tr></thead>
          <tbody>`;

      const baseRep = ex.reps.split('–')[0];
      const kgPlaceholder = rec && rec.kg > 0 ? String(rec.kg) : 'kg';
      for (let s = 1; s <= numSets; s++) {
        const sk = ei + '_' + s;
        const sd = draftDay[sk] || {};
        h += `<tr>
          <td>${s}</td>
          <td><input type="number" inputmode="decimal" step="0.5" placeholder="${kgPlaceholder}" value="${esc(sd.kg||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'kg',this.value.replace(',','.'))"></td>
          <td><input type="number" inputmode="numeric" placeholder="${baseRep}" value="${esc(sd.reps||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'reps',this.value)"></td>
          <td><input type="text" inputmode="decimal" placeholder="—" value="${esc(sd.rpe||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'rpe',this.value.replace(',','.'))"></td>
          <td><input type="text" placeholder="note" value="${esc(sd.note||'')}" class="note-inp"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'note',this.value)"></td>
        </tr>`;
      }
      h += `</tbody></table></div></div>`;
    });
    h += `</div>`;

    const dtSafe = dayType.replace(/'/g,"\\'");
    h += `<button class="btn btn-primary" onclick="markCompleteExercise('${today}','${dtSafe}')">Mark Complete ✓</button>`;
    h += `<div style="height:8px"></div>`;
  }

  // Coming Up section
  h += buildComingUp(today);

  el.innerHTML = h;
}

function buildComingUp(fromDateStr) {
  let rows = '';
  for (let i = 1; i <= 6; i++) {
    const d = new Date(parseLocal(fromDateStr));
    d.setDate(d.getDate() + i);
    const dStr  = localDateStr(d);
    const dInfo = getCycleInfo(dStr);
    if (!dInfo) continue;
    const wk       = WORKOUTS[dInfo.dayType];
    const dayFmt   = parseLocal(dStr).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
    const badgeCls = typeBadgeClass(dInfo.dayType);
    let detail = '';
    if (wk.rest) detail = 'Rest &amp; recovery';
    else if (wk.checklistOnly) detail = wk.items.slice(0,2).map(it => parseItem(it).name).join(', ') + (wk.items.length > 2 ? '…' : '');
    else detail = wk.exercises.slice(0,3).map(e => e.name).join(', ') + (wk.exercises.length > 3 ? '…' : '');
    rows += `<div style="padding:9px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start">
      <span class="badge ${badgeCls}" style="flex-shrink:0;margin-top:1px;font-size:12px">${dInfo.dayType}</span>
      <div>
        <div style="font-size:13px;font-weight:600">${dayFmt}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.3">${detail}</div>
      </div>
    </div>`;
  }
  if (!rows) return '';
  return `<div class="card" style="margin-top:4px">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleUpcoming()">
      <div style="font-size:17px;font-weight:600">Coming Up</div>
      <span id="upcoming-chev" style="color:var(--text-secondary);font-size:18px;line-height:1">▾</span>
    </div>
    <div id="upcoming-body" style="display:none;margin-top:8px">${rows}</div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function toggleCL(i, prefix) {
  const li  = document.getElementById(prefix + i);
  const chk = document.getElementById((prefix==='cli-'?'clchk-':'wuchk-') + i);
  li.classList.toggle('done', chk.checked);
}

function upMobDraft(date, dayType, itemIdx, roundIdx, checked) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  draft[dKey]['mob_' + itemIdx + '_' + roundIdx] = checked;
  saveDraft(draft);
  const li = document.getElementById('cli-' + itemIdx + '-' + roundIdx);
  if (li) li.classList.toggle('done', checked);
}

function upCarryDraft(date, dayType, itemIdx, roundIdx, kg) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  draft[dKey]['mob_' + itemIdx + '_' + roundIdx + '_kg'] = kg;
  saveDraft(draft);
}

function upWarmupDraft(date, dayType, i, checked) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  draft[dKey]['wu_' + i] = checked;
  saveDraft(draft);
  const li = document.getElementById('wu-' + i);
  if (li) li.classList.toggle('done', checked);
}

function markCompleteMobility(date, dayType) {
  const draft    = getDraft();
  const dKey     = date + '|' + dayType;
  const draftDay = draft[dKey] || {};
  const workout  = WORKOUTS[dayType];
  const exercises = workout.items.map((item, i) => {
    const parsed = parseItem(item);
    const isCarry = parsed.name === "Farmer's carry";
    const rounds = Array.from({ length: parsed.sets }, (_, r) =>
      draftDay['mob_' + i + '_' + (r + 1)] === true
    );
    if (isCarry) {
      const weights = Array.from({ length: parsed.sets }, (_, r) =>
        draftDay['mob_' + i + '_' + (r + 1) + '_kg'] || ''
      );
      return { name: parsed.name, rounds, weights };
    }
    return { name: item, rounds };
  });
  markComplete(date, dayType, exercises);
}

function toggleUpcoming() {
  const body = document.getElementById('upcoming-body');
  const chev = document.getElementById('upcoming-chev');
  if (!body) return;
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  chev.textContent = open ? '▴' : '▾';
}

function upDraft(date, dayType, ei, s, field, val) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  const sk = ei + '_' + s;
  if (!draft[dKey][sk]) draft[dKey][sk] = {};
  draft[dKey][sk][field] = val;
  saveDraft(draft);
}

function collectExercises(date, dayType) {
  const info     = getCycleInfo(date);
  const phase    = info ? info.phase : 1;
  const draft    = getDraft();
  const dKey     = date + '|' + dayType;
  const draftDay = draft[dKey] || {};
  const workout  = getPhaseExercises(dayType, phase);
  if (!workout || !workout.exercises) return [];
  return workout.exercises.map((ex, ei) => {
    const numSets = getSetsForPhase(ex.name, phase);
    const sets = [];
    for (let s = 1; s <= numSets; s++) {
      const sd = draftDay[ei+'_'+s] || {};
      sets.push({ set:s, kg:sd.kg||'', reps:sd.reps||'', rpe:sd.rpe||'', note:sd.note||'' });
    }
    return { name: ex.name, sets };
  });
}

function markCompleteExercise(date, dayType) {
  const exercises = collectExercises(date, dayType);
  markComplete(date, dayType, exercises);
}

function markComplete(date, dayType, exercises) {
  if (!confirm(`Mark ${dayType} session as complete?`)) return;

  const sessions = getSessions();
  const idx = sessions.findIndex(s => s.date === date);
  const session = { id: Date.now(), date, dayType, exercises, completedAt: new Date().toISOString() };

  if (idx >= 0) sessions[idx] = session; else sessions.push(session);
  saveSessions(sessions);

  const draft = getDraft();
  delete draft[date + '|' + dayType];
  saveDraft(draft);

  const btn = document.querySelector('#tab-today .btn-primary');
  if (btn) {
    btn.textContent = 'Saved! ✓';
    btn.className = 'btn btn-success';
    setTimeout(() => renderToday(), 1200);
  }
}

// Render a set row from log data, handling both old and new formats
function renderSetRow(st, idx) {
  if (st.reps !== undefined) {
    // New format
    return `<tr>
      <td>${st.set || idx+1}</td>
      <td>${st.kg||'—'}</td>
      <td>${st.reps||'—'}</td>
      <td>${st.rpe||'—'}</td>
      <td>${esc(st.note||'')}</td></tr>`;
  } else {
    // Old format: r1/r2/r3 within a single row — expand to 3 rows
    let rows = '';
    if (st.r1 || st.r2 || st.r3) {
      [[1,'r1'],[2,'r2'],[3,'r3']].forEach(([n, key]) => {
        if (st[key]) rows += `<tr>
          <td>${n}</td>
          <td>${st.kg||'—'}</td>
          <td>${st[key]||'—'}</td>
          <td>${n===1?st.rpe||'—':'—'}</td>
          <td>${n===1?esc(st.note||''):''}</td></tr>`;
      });
    } else {
      rows = `<tr><td>—</td><td>${st.kg||'—'}</td><td>—</td><td>${st.rpe||'—'}</td><td>${esc(st.note||'')}</td></tr>`;
    }
    return rows;
  }
}

      <button class="vt-btn${logView==='list'?' active':''}" onclick="setLogView('list')">Sessions</button>

function toggleSess(idx) {
  const body = document.getElementById('sbody-'+idx);

}

function getWeekOptions(sessions) {
  if (!sessions) sessions = getSessions();
  if (!sessions.length) return [];
  const weeks = new Map();
  sessions.forEach(s => {
    const d   = parseLocal(s.date);
    const dow = d.getDay();
    const ws  = new Date(d);
    ws.setDate(d.getDate() - dow);
    const wsStr = localDateStr(ws);
    weeks.set(wsStr, (weeks.get(wsStr) || 0) + 1);
  });
  return Array.from(weeks.entries())
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([wsStr, count]) => {
      const we = new Date(parseLocal(wsStr));
      we.setDate(we.getDate() + 6);
      const label = `${fmtDate(wsStr,{day:'numeric',month:'short',year:'numeric'})} – ${fmtDate(localDateStr(we),{day:'numeric',month:'short'})} (${count} session${count>1?'s':''})`;
      return { value: wsStr, label };
    });
}

function exportSelectedWeek() {

  exportWeek(sel.value);
}

function exportWeek(weekStartStr) {
  const wkStart = parseLocal(weekStartStr);
  const wkEnd   = new Date(wkStart);
  wkEnd.setDate(wkStart.getDate() + 6);
  const weStr   = localDateStr(wkEnd);

  const sessions = getSessions().filter(s => s.date >= weekStartStr && s.date <= weStr);

  let doc = `<!DOCTYPE html><html><head><title>Workout Log</title>
  <style>
    body{font-family:sans-serif;max-width:720px;margin:40px auto;color:#111}
    h1{font-size:22px;margin-bottom:4px}
    .sub{color:#666;font-size:14px;margin-bottom:24px}
    h2{font-size:17px;margin:28px 0 4px;padding-bottom:6px;border-bottom:2px solid #222}
    h3{font-size:14px;font-weight:600;margin:14px 0 4px;color:#444}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px}
    th,td{border:1px solid #ccc;padding:6px 8px;text-align:center}
    th{background:#f5f5f5;font-weight:600}
    td:last-child{text-align:left}
    .no-sessions{color:#666;font-style:italic}
    .mob-item{font-size:13px;margin:4px 0}
    .carry-weight{color:#007aff;font-weight:600;margin-left:6px}
  </style></head><body>
  <h1>Workout Log</h1>
  <div class="sub">${fmtDate(weekStartStr,{day:'numeric',month:'long',year:'numeric'})} &ndash; ${fmtDate(weStr,{day:'numeric',month:'long',year:'numeric'})}</div>`;

  if (!sessions.length) {
    doc += `<p class="no-sessions">No sessions logged this week.</p>`;
  } else {
    sessions.forEach(s => {
      doc += `<h2>${fmtDate(s.date,{weekday:'long',day:'numeric',month:'long'})} &mdash; ${s.dayType}</h2>`;
      const hasEx  = s.exercises && s.exercises.length > 0;
      const isMob  = hasEx && s.exercises[0].rounds !== undefined;
      const hasReg = hasEx && s.exercises[0].sets;
      if (isMob) {
        s.exercises.forEach(ex => {
          doc += `<h3>${ex.name}</h3>`;
          const isCarry = ex.name === "Farmer's carry";
          ex.rounds.forEach((done, r) => {
            const wLabel = isCarry && ex.weights && ex.weights[r]
              ? `<span class="carry-weight">${ex.weights[r]} kg</span>` : '';
            doc += `<div class="mob-item">${done ? '&#x2705;' : '&#x2B1C;'} Set ${r+1} ${wLabel}</div>`;
          });
        });
      } else if (hasReg) {
        s.exercises.forEach(ex => {
          const isNew = ex.sets[0] && ex.sets[0].reps !== undefined;
          doc += `<h3>${ex.name}</h3>
            <table><tr><th>Set</th><th>kg</th><th>Reps</th><th>RPE</th><th>Note</th></tr>`;
          if (isNew) {
            ex.sets.forEach(st => {
              doc += `<tr><td>${st.set||''}</td><td>${st.kg||'—'}</td><td>${st.reps||'—'}</td><td>${st.rpe||'—'}</td><td>${st.note||''}</td></tr>`;
            });
          } else {
            // Old format
            ex.sets.forEach((st, si) => {
              [[1,'r1'],[2,'r2'],[3,'r3']].forEach(([n,key]) => {
                if (st[key]) doc += `<tr><td>${n}</td><td>${st.kg||'—'}</td><td>${st[key]||'—'}</td><td>${n===1?st.rpe||'—':'—'}</td><td>${n===1?st.note||'':''}</td></tr>`;
              });
            });
          }
          doc += `</table>`;
        });
      }
    });
  }

  doc += `</body></html>`;

  const blob = new Blob([doc], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const pw   = window.open(url, '_blank');
  if (pw) pw.addEventListener('load', () => { pw.focus(); pw.print(); });

function renderWeeklyView(sessions) {
  const start = getStartDate();
  const today = localDateStr();
  if (!start) return `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No start date set</div><div class="empty-sub">Go to Settings to set your program start date</div></div>`;

  const sessionMap = {};
  sessions.forEach(s => { sessionMap[s.date] = s; });

  const totalDays  = daysBetween(start, today);
  const totalWeeks = Math.floor(totalDays / 7) + 1;

  const typeCounts = {};
  const typeDone   = {};

  let h = '';

  for (let w = totalWeeks; w >= 1; w--) {
    const weekOffset    = (w - 1) * 7;
    const weekStartDate = new Date(parseLocal(start));
    weekStartDate.setDate(weekStartDate.getDate() + weekOffset);
    const weekEndDate = new Date(weekStartDate);
    weekEndDate.setDate(weekStartDate.getDate() + 6);

    const wsStr = localDateStr(weekStartDate);
    const weStr = localDateStr(weekEndDate);
    const wInfo = getCycleInfo(wsStr);
    const phase = wInfo ? wInfo.phase : 1;

    const wsFmt = fmtDate(wsStr, {day:'numeric', month:'short'});
    const weFmt = fmtDate(weStr, {day:'numeric', month:'short'});

    h += `<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div style="padding:11px 16px;background:#f8f8fa;border-bottom:1px solid var(--border)">
        <div style="font-weight:700;font-size:15px">Week ${w} &nbsp;<span style="font-size:12px;font-weight:400;color:var(--text-secondary)">Phase ${phase}</span></div>
        <div style="font-size:12px;color:var(--text-secondary)">${wsFmt} &ndash; ${weFmt}</div>
      </div>`;

    for (let d = 0; d < 7; d++) {
      const dayDate  = new Date(weekStartDate);
      dayDate.setDate(weekStartDate.getDate() + d);
      const dayStr   = localDateStr(dayDate);
      const isFuture = dayStr > today;
      const dayType  = DAY_TYPES[d];
      const isRest   = dayType === 'Rest';
      const done     = !!sessionMap[dayStr];

      if (!isFuture && !isRest) {
        typeCounts[dayType] = (typeCounts[dayType] || 0) + 1;
        if (done) typeDone[dayType] = (typeDone[dayType] || 0) + 1;
      }

      const badgeCls = typeBadgeClass(dayType);
      const dayFmt   = parseLocal(dayStr).toLocaleDateString('en-GB', {weekday:'short', day:'numeric'});

      let statusHtml;
      if (isRest)        statusHtml = `<span style="font-size:12px;color:var(--text-secondary)">Rest</span>`;
      else if (isFuture) statusHtml = `<span style="font-size:12px;color:var(--text-secondary)">—</span>`;
      else if (done)     statusHtml = `<span style="font-size:12px;color:var(--green);font-weight:600">✅ Done</span>`;
      else               statusHtml = `<span style="font-size:12px;color:var(--red);font-weight:600">⬜ Missed</span>`;

      const noBorder = d === 6 ? 'border-bottom:none' : 'border-bottom:1px solid var(--border)';
      h += `<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;${noBorder};${isFuture?'opacity:.45':''}">
        <span class="badge ${badgeCls}" style="min-width:80px;justify-content:center;font-size:12px">${dayType}</span>
        <div style="flex:1;font-size:13px;color:var(--text-secondary)">${dayFmt}</div>
        ${statusHtml}
      </div>`;
    }
    h += `</div>`;
  }

  // Adherence summary
  const uniqueTypes = [...new Set(DAY_TYPES.filter(t => t !== 'Rest'))];
  h += `<div class="sec-label">Adherence by Day Type</div>
  <div class="card" style="padding:0;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f2f2f7">
        <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Day Type</th>
        <th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Done</th>
        <th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Sched</th>
        <th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Miss%</th>
      </tr></thead>
      <tbody>`;
  uniqueTypes.forEach(t => {
    const sched    = typeCounts[t] || 0;
    const doneCount= typeDone[t]   || 0;
    const miss     = sched > 0 ? Math.round((1 - doneCount / sched) * 100) : null;
    const badgeCls = typeBadgeClass(t);
    h += `<tr style="border-top:1px solid var(--border)">
      <td style="padding:10px 14px"><span class="badge ${badgeCls}">${t}</span></td>
      <td style="padding:10px 14px;text-align:center;color:var(--green);font-weight:600">${doneCount}</td>
      <td style="padding:10px 14px;text-align:center">${sched}</td>
      <td style="padding:10px 14px;text-align:center;${miss !== null && miss > 50 ? 'color:var(--red);font-weight:600' : ''}">${miss !== null ? miss+'%' : '—'}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;

  return h;
}

      </div>
      <div class="setting-row">
        <div class="setting-label">Today's Day Type</div>
        <div class="setting-val">${info ? 'Day ' + info.cycleDay + ' — ' + info.dayType : '—'}</div>
      </div>
    </div>

    <div class="sec-label">Data</div>
    <div class="card">
      <div class="setting-row">
        <div class="setting-label">Sessions logged</div>
        <div class="setting-val">${getSessions().length}</div>
      </div>
    </div>

    <div style="height:6px"></div>
    <button class="btn btn-danger" onclick="clearAll()">Clear All Data</button>
    <div style="height:14px"></div>
    <div style="text-align:center;font-size:12px;color:var(--text-secondary)">All data stored on this device · No account needed</div>`;
}

function saveStartDate(val) {
  ls('startDate', val);
  renderSettings();
}

function clearAll() {
  if (!confirm('Delete ALL workout data? This cannot be undone.')) return;
  if (!confirm('Final confirmation — permanently clear everything?')) return;
  Object.keys(localStorage)
    .filter(k => k.startsWith(PFX))
    .forEach(k => localStorage.removeItem(k));
  renderSettings();
  alert('All data cleared.');
}

// ════════════════════════════════════════════════════

// ════════════════════════════════════════════════════

renderTab('today');
</script>
</body>
