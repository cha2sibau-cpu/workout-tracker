<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="W2K">
<meta name="theme-color" content="#fafafa">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>W2K Workout</title>
<style>
:root {
  /* ── Surfaces ── */
  --bg: #fafafa;
  --card: #ffffff;
  --surface-alt: #f4f4f5;
  --surface-invert: #0a0a0a;

  /* ── Ink ── */
  --text: #0a0a0a;
  /* 4.81:1 on --surface-alt, the worst-case surface it lands on. */
  --text-secondary: #6b6b73;
  --text-invert: #ffffff;

  /* ── Lines ── */
  --border: #e4e4e7;
  --border-strong: #0a0a0a;

  /* ── Accent: volt. FILL ONLY — 1.3:1 on white, so never use as
     `color:` or `border-color:`. Always pair with --accent-ink. ── */
  --accent: #d7ff3e;
  --accent-ink: #0a0a0a;

  /* ── Danger: injury cautions and back-off signals ONLY.
     Kept rare so it stays pre-attentive. ── */
  --danger: #d01b20;
  --danger-bg: #fef2f2;

  /* ── Geometry ── */
  --r-xs: 2px;
  --r-sm: 4px;
  --r-md: 6px;

  /* ── Motion ── */
  --dur: 100ms;
  --ease: cubic-bezier(.2,0,0,1);

  /* ── Space ── */
  --s1: 4px;  --s2: 8px;  --s3: 12px;
  --s4: 16px; --s5: 24px; --s6: 32px;

  --tab-h: 83px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--tab-h) + var(--safe-bottom));-webkit-font-smoothing:antialiased}

/* ── Tab bar ── */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:6px;padding-bottom:var(--safe-bottom);z-index:999}
.tab-btn{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;padding:6px 4px;cursor:pointer;color:var(--text-secondary);font-size:10px;font-weight:600;letter-spacing:.2px;min-height:44px;transition:color var(--dur) var(--ease)}
/* Volt can't tint the label (invisible on white) — it becomes a fill bar instead. */
.tab-btn.active{color:var(--text)}
.tab-btn.active::before{content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--accent)}
.tab-btn svg{width:24px;height:24px;stroke-width:1.8}
.tab-btn.active svg{stroke-width:2.2}

/* ── Layout ── */
.tab-pane{display:none;padding:0 16px 24px;max-width:820px;margin:0 auto}
.tab-pane.active{display:block}

/* ── Page header ── */
.ph{padding:20px 0 10px}
.ph-title{font-size:30px;font-weight:800;letter-spacing:-.8px}
.ph-sub{font-size:14px;color:var(--text-secondary);margin-top:3px}

/* ── Card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--s4);margin-bottom:var(--s3)}
.card-title{font-size:17px;font-weight:700;letter-spacing:-.2px;margin-bottom:var(--s3)}

/* ── Badges ──
   Day-type badges carry meaning by letterform only — no hue. */
.badge{display:inline-flex;align-items:center;padding:4px 9px;border-radius:var(--r-xs);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-blue{background:var(--accent);color:var(--accent-ink)}
.badge-green{background:var(--accent);color:var(--accent-ink)}
.badge-gray{background:var(--surface-alt);color:var(--text-secondary)}
.badge-push,.badge-pull,.badge-mob,.badge-lower,.badge-rest{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}

/* ── Section label: high-contrast block ── */
.sec-label{display:block;background:var(--surface-invert);color:var(--text-invert);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:var(--s2) var(--s3);margin:18px 0 8px}

/* ── Checklist ── */
.checklist{list-style:none}
.cl-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:48px;user-select:none}
.cl-item:last-child{border-bottom:none}
/* Black rather than volt: browsers pick the checkmark color themselves,
   and a white check on volt is unreliable across engines. */
.cl-item input[type=checkbox]{width:22px;height:22px;accent-color:var(--surface-invert);flex-shrink:0;cursor:pointer}
.cl-item label{font-size:15px;cursor:pointer;flex:1;line-height:1.4}
.cl-item.done label{text-decoration:line-through;color:var(--text-secondary)}

/* ── Warning label ── */
.warn-label{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--danger);background:var(--danger-bg);border-left:2px solid var(--danger);padding:4px 9px;border-radius:var(--r-xs);flex-shrink:0;line-height:1.3;margin-top:4px}

/* ── Exercise block ── */
.ex-block{margin-bottom:20px}
.ex-block:last-child{margin-bottom:0}
.ex-header{margin-bottom:8px}
.ex-name{font-size:16px;font-weight:600;line-height:1.3}
.ex-target{font-size:12px;color:var(--text-secondary);margin-top:2px}
.ex-divider{height:1px;background:var(--border);margin:16px 0}

/* ── Recommendation badge ──
   volt = go heavier · outline = hold · red = back off (injury-adjacent) */
.rec-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:var(--r-xs);font-size:12px;font-weight:700;margin-top:5px}
.rec-up{background:var(--accent);color:var(--accent-ink)}
.rec-same{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}
.rec-down{background:var(--danger-bg);color:var(--danger);border-left:2px solid var(--danger)}
.rec-new{background:var(--surface-alt);color:var(--text-secondary)}
.last-sess{font-size:11px;color:var(--text-secondary);margin-top:3px;padding-left:1px}
.last-sess.rec-loading{font-style:italic;opacity:.75}

/* ── Previous session note ── */
.prev-note{background:var(--surface-alt);border-left:2px solid var(--border-strong);border-radius:0;padding:7px 10px;margin-top:7px;font-size:12px;color:var(--text-secondary);line-height:1.5}

/* ── Log table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px}
table.log-tbl{border-collapse:collapse;min-width:420px;width:100%}
.log-tbl th{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;padding:5px 4px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
.log-tbl th:first-child{text-align:left;width:30px;padding-left:0}
.log-tbl td{padding:3px 3px;text-align:center;vertical-align:middle}
.log-tbl td:first-child{font-size:13px;font-weight:600;color:var(--text-secondary);text-align:left;padding-left:0}
.log-tbl input{width:100%;min-height:46px;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:4px 5px;font-size:15px;font-weight:600;text-align:center;background:var(--bg);color:var(--text);font-family:inherit;transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease);-webkit-appearance:none}
.log-tbl input:focus{outline:none;border-color:var(--border-strong);background:var(--card)}
.log-tbl col.c-set{width:30px}
.log-tbl col.c-kg{width:62px}
.log-tbl col.c-reps{width:58px}
.log-tbl col.c-rpe{width:54px}

/* ── Per-exercise note input ── */
.ex-note-inp{width:100%;box-sizing:border-box;margin-top:8px;min-height:40px;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;font-size:13px;text-align:left;background:var(--bg);color:var(--text);font-family:inherit;-webkit-appearance:none;transition:border-color var(--dur) var(--ease),background var(--dur) var(--ease)}
.ex-note-inp:focus{outline:none;border-color:var(--border-strong);background:var(--card)}

/* ── Farmer carry weight input ── */
.carry-kg-inp{display:inline-block;width:70px;min-height:36px;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:4px 6px;font-size:14px;font-weight:600;text-align:center;background:var(--bg);color:var(--text);font-family:inherit;margin-left:8px;vertical-align:middle;-webkit-appearance:none}
.carry-kg-inp:focus{outline:none;border-color:var(--border-strong);background:var(--card)}
.carry-hint{font-size:11px;color:var(--text-secondary);padding:2px 0 6px 34px}

/* ── Buttons ── */
/* Bare .btn is the neutral secondary — variants below override the fill. */
.btn{display:block;width:100%;min-height:52px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface-alt);color:var(--text);font-size:16px;font-weight:700;letter-spacing:.2px;cursor:pointer;transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease);font-family:inherit}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-primary{background:var(--accent);color:var(--accent-ink);border-color:transparent}
.btn-success{background:var(--accent);color:var(--accent-ink);border-color:transparent}
.btn-danger{background:var(--danger);color:var(--text-invert);border-color:transparent}
.btn-outline{background:transparent;border:1.5px solid var(--border-strong);color:var(--text);font-size:15px;min-height:46px}
.btn-sm{min-height:44px;font-size:14px;border-radius:var(--r-sm)}
.btn + .btn{margin-top:10px}

/* ── Completion banner: the app's biggest positive moment ── */
.complete-banner{background:var(--accent);border:none;border-radius:var(--r-sm);padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.complete-banner .cb-icon{font-size:24px}
.complete-banner .cb-text{font-size:15px;font-weight:800;letter-spacing:-.2px;color:var(--accent-ink)}
.complete-banner .cb-sub{font-size:13px;font-weight:600;color:var(--accent-ink);opacity:.7}

/* ── Rest screen ── */
.rest-screen{text-align:center;padding:50px 20px}
.rest-icon{font-size:72px;margin-bottom:18px}
.rest-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.rest-sub{font-size:16px;color:var(--text-secondary);line-height:1.5}

/* ── Log tab ── */
.session-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:10px;overflow:hidden}
.session-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;min-height:56px;gap:8px}
.session-date{font-weight:600;font-size:15px}
.session-meta{font-size:12px;color:var(--text-secondary);margin-top:2px}
.session-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.session-chev{color:var(--text-secondary);font-size:14px;transition:transform .2s}
.session-chev.open{transform:rotate(180deg)}
.session-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.session-body.open{display:block}
.sess-ex{margin-top:14px}
.sess-ex-name{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
table.view-tbl{border-collapse:collapse;width:100%;font-size:13px}
.view-tbl th{color:var(--text-secondary);font-weight:500;text-align:center;padding:5px 6px;font-size:11px;border-bottom:1px solid var(--border)}
.view-tbl th:first-child{text-align:left}
.view-tbl td{text-align:center;padding:5px 6px;border-bottom:1px solid var(--border)}
.view-tbl td:first-child{text-align:left;font-weight:600}
.view-tbl tr:last-child td{border-bottom:none}
.view-tbl td:last-child{text-align:left;color:var(--text-secondary);font-size:12px}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--text-secondary)}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px}

/* ── Schedule tab ── */
.phase-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:12px;overflow:hidden}
/* All four phases share one black bar — the phase number carries the distinction. */
.phase-hdr{padding:14px 16px;font-size:15px;font-weight:700;line-height:1.3;letter-spacing:-.2px;background:var(--surface-invert);color:var(--text-invert)}
.ph1-hdr,.ph2-hdr,.ph3-hdr,.ph4-hdr{background:var(--surface-invert);color:var(--text-invert)}
.phase-body{padding:10px 16px 14px}
.pi{font-size:14px;padding:7px 0;border-bottom:1px solid var(--border);line-height:1.4}
.pi:last-child{border-bottom:none}
.pi-warn{color:var(--danger);font-weight:700}
.pi-amber{color:var(--text);font-weight:700}

/* ── RPE table ── */
table.rpe-tbl{border-collapse:collapse;width:100%;font-size:14px}
.rpe-tbl th{background:var(--surface-alt);padding:10px 14px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.8px}
.rpe-tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.rpe-tbl tr:last-child td{border-bottom:none}
.rpe-7{color:var(--text);font-weight:700}
.rpe-75{color:var(--text);font-weight:700}
.rpe-red{color:var(--danger);font-weight:700}

/* ── Progression tab ── */
table.prog-tbl{border-collapse:collapse;width:100%;font-size:14px}
.prog-tbl th{background:var(--surface-alt);padding:10px 14px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.8px}
.prog-tbl td{padding:10px 14px;border-bottom:1px solid var(--border)}
.prog-tbl tr:last-child td{border-bottom:none}
.prog-tbl td:last-child{text-align:right;font-weight:700;color:var(--text)}
.rule-row{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;line-height:1.5}
.rule-row:last-child{border-bottom:none}
.red-flag{color:var(--danger);font-weight:700}

/* ── DNA card ── */
.dna-card{background:var(--card);border:2px solid var(--border-strong);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:10px}
.dna-title{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.dna-item{font-size:14px;padding:5px 0;line-height:1.4;display:flex;gap:8px}
.dna-item::before{content:"⚑";color:var(--text);flex-shrink:0;margin-top:1px}

/* ── Settings ── */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);min-height:54px;gap:8px}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:15px;font-weight:500}
.setting-sub{font-size:12px;color:var(--text-secondary);margin-top:2px}
.setting-val{font-size:14px;color:var(--text-secondary);text-align:right}
input[type=date].date-input{height:44px;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:0 12px;font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;min-width:156px;-webkit-appearance:none}
input[type=date].date-input:focus{outline:none;border-color:var(--border-strong)}

/* ── Log view toggle ── */
.view-toggle{display:flex;gap:6px;margin-bottom:14px}
.vt-btn{flex:1;min-height:40px;border:1.5px solid var(--border-strong);border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background var(--dur) var(--ease),color var(--dur) var(--ease);background:transparent;color:var(--text)}
.vt-btn.active{background:var(--surface-invert);color:var(--text-invert)}

/* ── Export row ── */
.export-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.export-sel{flex:1;min-width:0;height:44px;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:0 12px;font-size:14px;background:var(--bg);color:var(--text);font-family:inherit}
.export-sel:focus{outline:none;border-color:var(--border-strong)}
.log-select{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:var(--accent)}
.log-selectall{flex:1;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-secondary);cursor:pointer}
.log-selectall input{width:16px;height:16px;accent-color:var(--accent)}

/* ── Print ── */
@media print{
  .tab-bar,.btn,#tab-log .export-row,#tab-log .view-toggle{display:none!important}
  .tab-pane{display:block!important;padding:0}
  .session-body{display:block!important}
  body{padding:0;background:#fff}
  .card,.session-card,.phase-card{box-shadow:none;border:1px solid #ccc}
}

#login-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-card{max-width:320px;width:90%;background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:24px;text-align:center}
.login-card input{width:100%;padding:11px;margin:12px 0;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);box-sizing:border-box}
.login-card input:focus{outline:none;border-color:var(--border-strong)}
/* Black, not volt — this is a neutral gateway, not a progress moment. */
.login-card button{width:100%;padding:11px;border:none;border-radius:var(--r-sm);background:var(--surface-invert);color:var(--text-invert);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.login-card button.login-secondary{background:none;color:var(--text-secondary);font-weight:400;margin-top:8px}
#login-code{letter-spacing:6px;text-align:center;font-size:20px;font-weight:700}
#login-status{margin-top:10px;font-size:12px;color:var(--text-secondary)}
body.authed #login-gate{display:none}
body:not(.authed) .tab-bar,body:not(.authed) .tab-pane{display:none}

.btn-ask-claude{margin-top:6px;padding:5px 10px;font-size:12px;font-weight:600;border:1px solid var(--border-strong);color:var(--text);background:none;border-radius:var(--r-xs);cursor:pointer;font-family:inherit}

.coach-thread{display:flex;flex-direction:column;gap:10px;padding-bottom:12px}
.coach-msg{max-width:85%;padding:10px 13px;border-radius:var(--r-sm);font-size:14px;line-height:1.5;white-space:pre-wrap}
.coach-msg.user{align-self:flex-end;background:var(--surface-invert);color:var(--text-invert)}
.coach-msg.assistant{align-self:flex-start;background:var(--card);border:1px solid var(--border)}
.coach-msg.pending{opacity:.6}
.coach-empty{color:var(--text-secondary);font-size:14px;text-align:center;padding:24px 12px}
.coach-input-row{position:sticky;bottom:0;display:flex;gap:8px;padding:10px 0;background:var(--bg)}
.coach-input{flex:1;min-height:44px;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-size:15px;background:var(--card);color:var(--text);font-family:inherit;resize:none}
.coach-input:focus{outline:none;border-color:var(--border-strong)}
.coach-send-btn{min-width:64px;border:none;border-radius:var(--r-sm);background:var(--accent);color:var(--accent-ink);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.coach-send-btn:disabled{opacity:.4;cursor:default}
.coach-error{color:var(--danger);font-size:13px;text-align:center;padding:6px 0}

.seq-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:8px;font-size:14px}
.seq-loading{color:var(--text-secondary)}
.seq-err{color:var(--danger)}
.seq-summary{line-height:1.5;margin-bottom:8px}
.seq-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-secondary);margin:10px 0 4px}
.seq-list{margin:0;padding-left:20px}
.seq-list li{margin:6px 0;line-height:1.4}
.seq-name{font-weight:600}
.seq-reason{display:block;font-size:13px;color:var(--text-secondary);margin-top:1px}
.seq-superset{padding:6px 0;border-top:1px solid var(--border)}
.seq-superset:first-of-type{border-top:none}
.seq-foot{margin-top:10px;font-size:12px;color:var(--text-secondary)}
</style>
</head>
<body>

<div id="login-gate">
  <div class="login-card">
    <h2>Sign in</h2>
    <p id="login-desc">Enter your email to get a sign-in code.</p>
    <div id="login-step-email">
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"
        onkeydown="if(event.key==='Enter')sendCode()">
      <button onclick="sendCode()">Send code</button>
    </div>
    <div id="login-step-code" style="display:none">

// Email the user is verifying — captured at the "send code" step so the

async function sendCode() {
  const email = document.getElementById('login-email').value.trim();
  const statusEl = document.getElementById('login-status');
  if (!email) { statusEl.textContent = 'Enter an email.'; return; }
  statusEl.textContent = 'Sending...';

  // delivers a 6-digit code instead of a magic link. This matters for the
  // installed PWA — clicking a link opens the browser, not the app; a code

async function verifyCode() {
  const token = document.getElementById('login-code').value.trim();
  const statusEl = document.getElementById('login-status');
  if (!/^\d{6,10}$/.test(token)) { statusEl.textContent = 'Enter the code from your email.'; return; }

  const { data, error } = await sb.auth.verifyOtp({ email: loginEmail, token, type: 'email' });

function parseSets(itemText) {
  const m = itemText.match(/(\d+)[×x]/i);
  return m ? parseInt(m[1]) : 1;
}

function parseItem(itemText) {
  const sep = itemText.indexOf(' — ');
  if (sep === -1) return { name: itemText, sets: 1, detail: '' };
  const name = itemText.slice(0, sep);
  const rest = itemText.slice(sep + 3);
  const m = rest.match(/^(\d+)[×x](.+)$/i);
  if (m) return { name, sets: parseInt(m[1]), detail: m[2] };
  return { name, sets: 1, detail: rest };
}

function getPhaseExercises(dayType, phase) {
  return WORKOUTS[dayType];
}

// Returns how many sets for this exercise at current phase
function getSetsForPhase(exerciseName, phase) {
  if (phase >= 4) return 2;
  if (phase === 3) return 4;
  if (phase === 2) {
    const fourSet = [
      'DB bench press','One-arm DB row (bench supported)','Seal row (chest supported)',
      'Romanian deadlift','Goblet squat','Bulgarian split squat',
      'Lateral raise','Reverse fly (bench supported)','Face pulls'
    ];
    return fourSet.includes(exerciseName) ? 4 : 3;
  }
  return 3; // Phase 1
}

// Weight increment per exercise type for progressive overload recommendations
function getWeightIncrement(exerciseName) {
  if (exerciseName === 'Overhead DB press') return 1;
  const isolation = [
    'Lateral raise','Hammer curl','Incline DB curl',
    'Reverse fly (bench supported)','Overhead triceps extension',
    'Weighted Russian twist','Face pulls'
  ];
  if (isolation.includes(exerciseName)) return 1;
  return 2.5;
}

// Returns recommendation object based on previous sessions
function getExerciseRecommendation(exerciseName, targetRepsStr, phase) {
  const sessions = getSessions().slice().reverse();
  for (const sess of sessions) {
    if (!sess.exercises) continue;
    const ex = sess.exercises.find(e => e.name === exerciseName);
    if (!ex || !ex.sets || !ex.sets.length) continue;

    // Normalize sets to { kg, reps, rpe } regardless of old/new format
    let allSets = [];
    const firstSet = ex.sets[0];
    if (firstSet.reps !== undefined) {
      // New format: each row is one set
      allSets = ex.sets.map(s => ({ kg: s.kg, reps: s.reps, rpe: s.rpe }));
    } else if (firstSet.r1 !== undefined) {
      // Old format: r1/r2/r3 are the three sets within one row
      const s = firstSet;
      if (s.r1) allSets.push({ kg: s.kg, reps: s.r1, rpe: s.rpe });
      if (s.r2) allSets.push({ kg: s.kg, reps: s.r2, rpe: s.rpe });
      if (s.r3) allSets.push({ kg: s.kg, reps: s.r3, rpe: s.rpe });
    }

    const filledSets = allSets.filter(s => s.reps && String(s.reps).trim());
    if (!filledSets.length) continue;

    const parts = targetRepsStr.split('–');
    const bottomTarget = parseInt(parts[0]);
    const topTarget = parts.length > 1 ? parseInt(parts[1]) : bottomTarget;

    const avgReps = filledSets.reduce((sum, s) => sum + (parseInt(s.reps) || 0), 0) / filledSets.length;
    const rpeVals = filledSets.map(s => parseFloat(s.rpe)).filter(r => !isNaN(r));
    const avgRPE = rpeVals.length ? rpeVals.reduce((a, b) => a + b, 0) / rpeVals.length : null;
    const lastKg = parseFloat(allSets.find(s => s.kg)?.kg) || 0;

    // Build last session summary
    const repsDisplay = filledSets.map(s => s.reps).join('/');
    const kgDisplay = lastKg > 0 ? lastKg + ' kg · ' : '';
    const rpeDisplay = avgRPE !== null ? ' · RPE ' + avgRPE.toFixed(1).replace(/\.0$/, '') : '';
    const lastSummary = `${kgDisplay}${repsDisplay} reps${rpeDisplay}`;

    const recSets = getSetsForPhase(exerciseName, phase);
    const inc = getWeightIncrement(exerciseName);
    let recKg = lastKg;
    let dir = 'same';
    let msg = 'On track — maintain weight';

    const gapFromBottom = bottomTarget - avgReps;
    if (lastKg <= 0) {
      dir = 'new';
      msg = 'No prior weight — start light';
    } else if (avgReps >= topTarget && (avgRPE === null || avgRPE <= 7.5)) {
      recKg = lastKg + inc;
      dir = 'up';
      msg = 'Hit top of range at low RPE → increase';
    } else if (avgReps >= topTarget) {
      recKg = lastKg + inc;
      dir = 'up';
      msg = 'Consistently hit top of rep range';
    } else if (gapFromBottom <= 1.5) {
      dir = 'same';
      msg = 'Close to target — maintain weight';
    } else {
      recKg = Math.max(0, lastKg - inc);
      dir = 'down';
      msg = 'Significantly below target reps — reduce weight';
    }

    return { sets: recSets, reps: targetRepsStr, kg: recKg, dir, msg, lastSummary };
  }
  return null;
}

// Legacy localStorage accessor — kept only so migrateLocalStorageIfNeeded()
// can read pre-Supabase data once.
function ls(key, val) {
  const k = PFX + key;
  if (val === undefined) {
    try { return JSON.parse(localStorage.getItem(k)); } catch { return null; }
  }
  localStorage.setItem(k, JSON.stringify(val));
}

const cache = { sessions: [], draft: {}, startDate: null, pauses: [] };

async function hydrateCache() {
  const { data: sessionRows, error: sessErr } = await sb.from('sessions').select('data').order('date');
  if (sessErr) { alert('Failed to load sessions: ' + sessErr.message); return false; }
  cache.sessions = sessionRows.map(r => r.data);

  // Select `pauses` too, but tolerate the column not existing yet (migration
  // 0004 may not have been applied) by falling back to the pre-pauses columns.
  let stateRow, stateErr;
  ({ data: stateRow, error: stateErr } = await sb.from('user_state').select('draft,start_date,pauses').maybeSingle());
  if (stateErr && /pauses/.test(stateErr.message || '')) {
    ({ data: stateRow, error: stateErr } = await sb.from('user_state').select('draft,start_date').maybeSingle());
  }
  if (stateErr) { alert('Failed to load app state: ' + stateErr.message); return false; }
  cache.draft = stateRow?.draft || {};
  cache.startDate = stateRow?.start_date || null;
  cache.pauses = Array.isArray(stateRow?.pauses) ? stateRow.pauses : [];
  return true;
}

// Migration is gated on a persistent marker, not on whether Supabase
// currently looks empty — cache.sessions.length reaching 0 is also the
// legitimate post-clearAll() state, and re-inferring "never migrated"
// from that would silently resurrect data the user deleted on purpose.
async function migrateLocalStorageIfNeeded() {
  if (ls('migrated')) return;
  const localSessions = ls('sessions') || [];
  const localDraft = ls('draft') || {};
  const localStart = ls('startDate') || null;

  // Only mark migration done if every attempted write actually reached
  // Supabase — a failed write must not be permanently skipped on the
  // next sign-in, since this is a one-time, irreplaceable-data operation.
  let ok = true;
  if (localSessions.length) ok = (await saveSessions(localSessions)) && ok;
  if (Object.keys(localDraft).length) ok = (await saveDraft(localDraft)) && ok;
  if (localStart) ok = (await saveStartDate(localStart)) && ok;

  if (ok) ls('migrated', true);
}

function getSessions() { return cache.sessions; }
async function saveSessions(v) {
  cache.sessions = v;
  if (!v.length) return true;
  const rows = v.map(s => ({ date: s.date, data: s }));
  const { error } = await sb.from('sessions').upsert(rows, { onConflict: 'user_id,date' });
  if (error) { console.error('saveSessions failed', error); alert('Failed to save sessions: ' + error.message); return false; }
  return true;
}

function getDraft() { return cache.draft; }
async function saveDraft(v) {
  cache.draft = v;
  const { error } = await sb.from('user_state').upsert({ draft: v }, { onConflict: 'user_id' });
  if (error) { console.error('saveDraft failed', error); alert('Failed to save draft: ' + error.message); return false; }
  return true;
}

function getStartDate() { return cache.startDate; }

function getPauses() { return cache.pauses || []; }

// ════════════════════════════════════════════════════
//  DATE / CYCLE HELPERS
// ════════════════════════════════════════════════════

function localDateStr(d) {
  const dd = d || new Date();
  return dd.getFullYear() + '-' +
    String(dd.getMonth()+1).padStart(2,'0') + '-' +
    String(dd.getDate()).padStart(2,'0');
}

function parseLocal(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function daysBetween(startStr, endStr) {
  return Math.floor((parseLocal(endStr) - parseLocal(startStr)) / 86400000);
}

// Number of paused calendar days strictly before dateStr, summed across all
// (non-overlapping) pause intervals. These days are removed from program
// progression so a break freezes the clock and resumes it afterward.
function pausedDaysBefore(dateStr) {
  let total = 0;
  for (const p of getPauses()) {
    if (!p || !p.start || !p.end) continue;
    // Count days d with p.start <= d <= p.end AND d < dateStr.
    // Exclusive upper bound = min(dateStr, p.end + 1 day).
    const endExclusive = daysBetween(p.end, dateStr) >= 1 ? addDays(p.end, 1) : dateStr;
    const overlap = daysBetween(p.start, endExclusive);
    if (overlap > 0) total += overlap;
  }
  return total;
}

// Is dateStr inside any pause interval (inclusive of both ends)?
function isPausedOn(dateStr) {
  return getPauses().some(p =>
    p && p.start && p.end &&
    daysBetween(p.start, dateStr) >= 0 && daysBetween(dateStr, p.end) >= 0
  );
}

function addDays(dateStr, n) {
  return localDateStr(new Date(parseLocal(dateStr).getTime() + n * 86400000));
}

function getCycleInfo(dateStr) {
  const start = getStartDate();
  if (!start) return null;
  const days = daysBetween(start, dateStr) - pausedDaysBefore(dateStr);
  if (days < 0) return null;
  const cycleDay  = (days % 7) + 1;
  const weekNum   = Math.floor(days / 7) + 1;
  const phase     = weekNum <= 6 ? 1 : weekNum <= 13 ? 2 : weekNum <= 20 ? 3 : 4;
  const dayType   = DAY_TYPES[cycleDay - 1];
  return { cycleDay, weekNum, phase, dayType, paused: isPausedOn(dateStr) };
}

function fmtDate(dateStr, opts) {
  return parseLocal(dateStr).toLocaleDateString('en-GB', opts || { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function typeBadgeClass(t) {
  if (t === 'Push')        return 'badge-push';
  if (t === 'Pull')        return 'badge-pull';
  if (t.includes('Mobil')) return 'badge-mob';
  if (t === 'Lower/Core')  return 'badge-lower';
  return 'badge-rest';
}

function renderToday() {
  const el = document.getElementById('today-inner');
  const today = localDateStr();
  const info  = getCycleInfo(today);

  if (!info) {
    el.innerHTML = `
      <div class="ph"><div class="ph-title">Today</div></div>
      <div class="card" style="text-align:center;padding:32px 16px">
        <div style="font-size:52px;margin-bottom:14px">📅</div>
        <div style="font-size:19px;font-weight:700;margin-bottom:8px">Set your start date</div>
        <div style="font-size:14px;color:var(--text-secondary);margin-bottom:22px">Go to Settings to configure your program start date and unlock your daily workout.</div>
        <button class="btn btn-primary" style="max-width:220px;margin:0 auto" onclick="goTab('settings')">Open Settings</button>
      </div>`;
    return;
  }

  if (info.paused) {
    const active = getPauses().find(p =>
      daysBetween(p.start, today) >= 0 && daysBetween(today, p.end) >= 0);
    const resume = active ? addDays(active.end, 1) : null;
    el.innerHTML = `
      <div class="ph"><div class="ph-title">Today</div>
        <div class="ph-sub" style="margin-top:6px">${fmtDate(today)}</div>
      </div>
      <div class="card" style="text-align:center;padding:32px 16px">
        <div style="font-size:52px;margin-bottom:14px">⏸️</div>
        <div style="font-size:19px;font-weight:700;margin-bottom:8px">On a break</div>
        <div style="font-size:14px;color:var(--text-secondary);margin-bottom:8px">Your program is paused — these days won't advance your week or phase.</div>
        ${resume ? `<div style="font-size:14px;color:var(--text-secondary)">Resumes <strong>${fmtDate(resume)}</strong>.</div>` : ''}
        <button class="btn btn-outline" style="max-width:220px;margin:22px auto 0" onclick="goTab('settings')">Manage breaks</button>
      </div>`;
    return;
  }

  const { cycleDay, weekNum, phase, dayType } = info;
  const workout   = getPhaseExercises(dayType, phase);
  const sessions  = getSessions();
  const todaySession = sessions.find(s => s.date === today);

  let h = `
    <div class="ph">
      <div class="ph-title">Today</div>
      <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center">
        <span class="badge badge-blue">Day ${cycleDay} · ${dayType}</span>
        <span class="badge badge-gray">Week ${weekNum} · Phase ${phase}</span>
      </div>
      <div class="ph-sub" style="margin-top:6px">${fmtDate(today)}</div>
    </div>`;

  if (todaySession) {
    const t = new Date(todaySession.completedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    h += `
      <div class="complete-banner">
        <div class="cb-icon">✅</div>
        <div><div class="cb-text">Session logged at ${t}</div><div class="cb-sub">Tap below to update if needed</div></div>
      </div>`;
  }

  if (workout.rest) {
    h += `
      <div class="rest-screen">
        <div class="rest-icon">😴</div>
        <div class="rest-title">Rest Day</div>
        <div class="rest-sub">Recovery is where adaptation happens.<br>Hydrate. Sleep. Let the gains arrive.</div>
      </div>`;

  } else if (workout.checklistOnly) {
    const draft    = getDraft();
    const dKey     = today + '|' + dayType;
    const draftDay = draft[dKey] || {};
    const lastCarryKg = getLastCarryWeight();

    h += `<div class="card"><div class="card-title">${dayType}</div><ul class="checklist">`;
    workout.items.forEach((item, i) => {
      const parsed = parseItem(item);
      const isCarry = parsed.name === "Farmer's carry";
      for (let r = 1; r <= parsed.sets; r++) {
        const isChecked = draftDay['mob_' + i + '_' + r] === true;
        const carryKg = draftDay['mob_' + i + '_' + r + '_kg'] || '';
        const label = parsed.sets > 1
          ? `${parsed.name} &mdash; Set ${r} <span style="color:var(--text-secondary);font-weight:400">(${parsed.detail})</span>`
          : item;

        let carryInput = '';
        if (isCarry) {
          carryInput = `<input type="text" inputmode="decimal"
            class="carry-kg-inp" placeholder="${lastCarryKg || 'kg'}" value="${esc(carryKg)}"
            onclick="event.stopPropagation()"
            oninput="upCarryDraft('${today}','${dayType}',${i},${r},this.value.replace(',','.'))">`;
        }

        h += `<li class="cl-item${isChecked ? ' done' : ''}" id="cli-${i}-${r}">
          <input type="checkbox" id="clchk-${i}-${r}" ${isChecked ? 'checked' : ''}
            onchange="upMobDraft('${today}','${dayType}',${i},${r},this.checked)">
          <label for="clchk-${i}-${r}">${label}</label>${carryInput}</li>`;
      }

      if (isCarry && lastCarryKg) {
        h += `<div class="carry-hint">Last carry: <strong>${lastCarryKg} kg</strong></div>`;
      }
    });
    h += `</ul></div>
      <button class="btn btn-primary" onclick="markCompleteMobility('${today}','${dayType}')">Mark Complete ✓</button>`;

  } else {
    const draft    = getDraft();
    const dKey     = today + '|' + dayType;
    const draftDay = draft[dKey] || {};

    // Warm-up
    if (workout.warmup && workout.warmup.length) {
      h += `<div class="card"><div class="card-title">Warm-Up</div><ul class="checklist">`;
      workout.warmup.forEach((item, i) => {
        const isChecked = draftDay['wu_' + i] === true;
        h += `<li class="cl-item${isChecked ? ' done' : ''}" id="wu-${i}">
          <input type="checkbox" id="wuchk-${i}" ${isChecked ? 'checked' : ''}
            onchange="upWarmupDraft('${today}','${dayType}',${i},this.checked)">
          <label for="wuchk-${i}">${item}</label></li>`;
      });
      h += `</ul></div>`;
    }

    // Exercises — one row per set
    h += `<div class="card"><div class="card-title">Exercises</div>`;
    workout.exercises.forEach((ex, ei) => {
      if (ei > 0) h += `<div class="ex-divider"></div>`;

      const numSets = getSetsForPhase(ex.name, phase);
      const rec = getExerciseRecommendation(ex.name, ex.reps, phase);
      const prevNote = getPreviousNote(ex.name);

      // Recommendation display — Claude's recommendation once loaded, with the
      // local heuristic as an instant fallback. The slot id lets the async
      // fetch swap in Claude's version without re-rendering the whole screen.
      const dKey = today + '|' + dayType;
      const recHtml = `<div class="rec-slot" id="rec-slot-${ei}">${recBadgeHtml(rec, claudeRecFor(dKey, ex.name), claudeRecsLoading(dKey))}</div>`;

      // Previous session note
      let noteHtml = '';
      if (prevNote) {
        noteHtml = `<div class="prev-note">📝 Last session: "${esc(prevNote)}"</div>`;
      }

      h += `<div class="ex-block">
        <div class="ex-header">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-target">Target: ${ex.reps} reps</div>
          ${ex.warning ? `<div class="warn-label">⚠ ${ex.warning}</div>` : ''}
          ${recHtml}${noteHtml}
          <button class="btn-ask-claude" onclick="askCoachAboutExercise('${ex.name.replace(/'/g, "\\'")}')">🤖 Ask Claude</button>
        </div>
        <div class="tbl-wrap"><table class="log-tbl">
          <colgroup><col class="c-set"><col class="c-kg"><col class="c-reps"><col class="c-rpe"></colgroup>
          <thead><tr><th>Set</th><th>kg</th><th>Reps</th><th>RPE</th></tr></thead>
          <tbody>`;

      const baseRep = ex.reps.split('–')[0];
      const kgPlaceholder = rec && rec.kg > 0 ? String(rec.kg) : 'kg';
      for (let s = 1; s <= numSets; s++) {
        const sk = ei + '_' + s;
        const sd = draftDay[sk] || {};
        h += `<tr>
          <td>${s}</td>
          <td><input type="text" inputmode="decimal" placeholder="${kgPlaceholder}" value="${esc(sd.kg||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'kg',this.value.replace(',','.'))"></td>
          <td><input type="number" inputmode="numeric" placeholder="${baseRep}" value="${esc(sd.reps||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'reps',this.value)"></td>
          <td><input type="text" inputmode="decimal" placeholder="—" value="${esc(sd.rpe||'')}"
            oninput="upDraft('${today}','${dayType}',${ei},${s},'rpe',this.value.replace(',','.'))"></td>
        </tr>`;
      }
      // One note per exercise (not per set).
      const exNoteVal = draftDay[ei + '_note'] || '';
      h += `</tbody></table></div>
        <input type="text" class="ex-note-inp" placeholder="Note for this exercise (optional)" value="${esc(exNoteVal)}"
          oninput="upExNote('${today}','${dayType}',${ei},this.value)">
      </div>`;
    });
    h += `</div>`;

    const dtSafe = dayType.replace(/'/g,"\\'");
    h += `
      <button class="btn btn-outline btn-sm" id="seq-btn" style="width:100%;margin-bottom:8px" onclick="suggestSequence('${dtSafe}',${phase},${weekNum})">🔀 Suggest order / supersets</button>
      <div id="seq-panel"></div>`;
    h += `<button class="btn btn-primary" onclick="markCompleteExercise('${today}','${dtSafe}')">Mark Complete ✓</button>`;
    h += `<div style="height:8px"></div>`;
  }

  // Coming Up section
  h += buildComingUp(today);

  el.innerHTML = h;

  // On weighted-exercise days, ask Claude to generate the recommendations
  // (grounded in the previous same-type session + program). Slots are already
  // showing the local fallback; this swaps in Claude's version when ready.
  if (document.getElementById('rec-slot-0')) {
    ensureClaudeRecs(today, dayType, phase, weekNum, workout.exercises);
  }
}

// ════════════════════════════════════════════════════
//  CLAUDE-GENERATED ON-SCREEN RECOMMENDATIONS
// ════════════════════════════════════════════════════
// One batched call per workout (not one per exercise), cached per day so
// switching tabs doesn't refetch. The local heuristic shows instantly as a
// fallback and stays if the call is loading or fails.
const claudeRecsCache = {};

function claudeRecsLoading(dKey) {
  return !!(claudeRecsCache[dKey] && claudeRecsCache[dKey].status === 'loading');
}
function claudeRecFor(dKey, name) {
  const e = claudeRecsCache[dKey];
  return e && e.recs ? (e.recs[name] || null) : null;
}

function recBadgeHtml(localRec, claudeRec, loading) {
  const icon = d => d === 'up' ? '↑' : d === 'down' ? '↓' : d === 'new' ? '•' : '→';
  const cls  = d => d === 'up' ? 'rec-up' : d === 'down' ? 'rec-down' : d === 'new' ? 'rec-new' : 'rec-same';
  if (claudeRec) {
    const kgText = claudeRec.kg > 0 ? ` @ ${claudeRec.kg} kg` : '';
    return `<div class="rec-badge ${cls(claudeRec.dir)}">🤖 ${icon(claudeRec.dir)} Rec: ${claudeRec.sets}×${esc(String(claudeRec.reps))}${kgText}</div>`
      + (claudeRec.note ? `<div class="last-sess">${esc(claudeRec.note)}</div>` : '');
  }
  let base;
  if (!localRec) {
    base = `<div class="rec-badge rec-new">No prior data — start light</div>`;
  } else {
    const kgText = localRec.kg > 0 ? ` @ ${localRec.kg} kg` : '';
    base = `<div class="rec-badge ${cls(localRec.dir)}">${icon(localRec.dir)} Rec: ${localRec.sets}×${localRec.reps}${kgText}</div>`
      + `<div class="last-sess">Last: ${localRec.lastSummary}</div>`;
  }
  if (loading) base += `<div class="last-sess rec-loading">🤖 Claude is reviewing your last session…</div>`;
  return base;
}

// Update only the rec slots in place, so an in-progress set/rep input doesn't
// lose focus from a full re-render.
function paintRecSlots(dKey, dayType, phase, exercises) {
  if (localDateStr() + '|' + dayType !== dKey) return; // day rolled over
  const loading = claudeRecsLoading(dKey);
  exercises.forEach((ex, ei) => {
    const slot = document.getElementById('rec-slot-' + ei);
    if (!slot) return; // user navigated away or day type changed
    const localRec = getExerciseRecommendation(ex.name, ex.reps, phase);
    slot.innerHTML = recBadgeHtml(localRec, claudeRecFor(dKey, ex.name), loading);
  });
}

async function ensureClaudeRecs(today, dayType, phase, weekNum, exercises) {
  const dKey = today + '|' + dayType;
  const cached = claudeRecsCache[dKey];
  if (cached && (cached.status === 'loading' || cached.status === 'done')) return;

  claudeRecsCache[dKey] = { status: 'loading', recs: {} };
  paintRecSlots(dKey, dayType, phase, exercises);

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { claudeRecsCache[dKey] = { status: 'error', recs: {} }; return; }

    const isDeload = phase === 4 && weekNum <= 22;
    const payload = {
      phase, weekNum, dayType, isDeload,
      exercises: exercises.map(ex => ({
        name: ex.name, targetReps: ex.reps, recSets: getSetsForPhase(ex.name, phase)
      }))
    };
    const res = await fetch(SUPABASE_URL + '/functions/v1/recommend', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
      body: JSON.stringify(payload)
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || 'Request failed');

    const recs = {};
    (body.recommendations || []).forEach(r => { if (r && r.name) recs[r.name] = r; });
    claudeRecsCache[dKey] = { status: 'done', recs };
  } catch (err) {
    console.error('recommend failed', err);
    claudeRecsCache[dKey] = { status: 'error', recs: {} };
  }
  paintRecSlots(dKey, dayType, phase, exercises);
}

function askCoachAboutExercise(exerciseName) {
  goTab('coach');
  sendToCoach(`Should I adjust weight/reps for ${exerciseName} based on my recent performance?`);
}

// ── Dedicated "Suggest order / supersets" (Today screen) ──
async function suggestSequence(dayType, phase, weekNum) {
  const btn = document.getElementById('seq-btn');
  const panel = document.getElementById('seq-panel');
  if (!panel) return;

  const program = buildProgramContext(dayType, phase);
  const exercises = program.todayExercises || [];
  if (!exercises.length) { panel.innerHTML = `<div class="seq-card">No exercises to sequence today.</div>`; return; }

  if (btn) btn.disabled = true;
  panel.innerHTML = `<div class="seq-card seq-loading">🤖 Claude is optimizing your order…</div>`;

  try {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { panel.innerHTML = `<div class="seq-card">Not signed in.</div>`; return; }
    const isDeload = phase === 4 && weekNum <= 22;
    const res = await fetch(SUPABASE_URL + '/functions/v1/suggest-sequence', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
      body: JSON.stringify({ phase, weekNum, dayType, isDeload, exercises })
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || 'Request failed');
    panel.innerHTML = renderSequence(body);
  } catch (err) {
    panel.innerHTML = `<div class="seq-card seq-err">Error: ${esc(err.message)}</div>`;
  } finally {
    if (btn) btn.disabled = false;
  }
}

function renderSequence(data) {
  const seq = Array.isArray(data.sequence) ? data.sequence : [];
  const supers = Array.isArray(data.supersets) ? data.supersets : [];
  let h = `<div class="seq-card">`;
  if (data.summary) h += `<div class="seq-summary">${esc(data.summary)}</div>`;
  if (seq.length) {
    h += `<div class="seq-h">Suggested order</div><ol class="seq-list">`;
    seq.forEach(s => {
      h += `<li><span class="seq-name">${esc(s.name)}</span>${s.reason ? `<span class="seq-reason">${esc(s.reason)}</span>` : ''}</li>`;
    });
    h += `</ol>`;
  }
  if (supers.length) {
    h += `<div class="seq-h">Supersets</div>`;
    supers.forEach(ss => {
      const names = Array.isArray(ss.exercises) ? ss.exercises.map(esc).join(' + ') : '';
      h += `<div class="seq-superset"><span class="seq-name">${names}</span>${ss.reason ? `<span class="seq-reason">${esc(ss.reason)}</span>` : ''}</div>`;
    });
  } else {
    h += `<div class="seq-reason" style="margin-top:6px">No supersets recommended today.</div>`;
  }
  h += `<div class="seq-foot">Advisory only — your program isn't changed.</div></div>`;
  return h;
}

function buildComingUp(fromDateStr) {
  let rows = '';
  for (let i = 1; i <= 6; i++) {
    const d = new Date(parseLocal(fromDateStr));
    d.setDate(d.getDate() + i);
    const dStr  = localDateStr(d);
    const dInfo = getCycleInfo(dStr);
    if (!dInfo) continue;
    const wk       = WORKOUTS[dInfo.dayType];
    const dayFmt   = parseLocal(dStr).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
    const badgeCls = typeBadgeClass(dInfo.dayType);
    let detail = '';
    if (wk.rest) detail = 'Rest &amp; recovery';
    else if (wk.checklistOnly) detail = wk.items.slice(0,2).map(it => parseItem(it).name).join(', ') + (wk.items.length > 2 ? '…' : '');
    else detail = wk.exercises.slice(0,3).map(e => e.name).join(', ') + (wk.exercises.length > 3 ? '…' : '');
    rows += `<div style="padding:9px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start">
      <span class="badge ${badgeCls}" style="flex-shrink:0;margin-top:1px;font-size:12px">${dInfo.dayType}</span>
      <div>
        <div style="font-size:13px;font-weight:600">${dayFmt}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.3">${detail}</div>
      </div>
    </div>`;
  }
  if (!rows) return '';
  return `<div class="card" style="margin-top:4px">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleUpcoming()">
      <div style="font-size:17px;font-weight:600">Coming Up</div>
      <span id="upcoming-chev" style="color:var(--text-secondary);font-size:18px;line-height:1">▾</span>
    </div>
    <div id="upcoming-body" style="display:none;margin-top:8px">${rows}</div>
  </div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function toggleCL(i, prefix) {
  const li  = document.getElementById(prefix + i);
  const chk = document.getElementById((prefix==='cli-'?'clchk-':'wuchk-') + i);
  li.classList.toggle('done', chk.checked);
}

function upMobDraft(date, dayType, itemIdx, roundIdx, checked) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  draft[dKey]['mob_' + itemIdx + '_' + roundIdx] = checked;
  saveDraft(draft);
  const li = document.getElementById('cli-' + itemIdx + '-' + roundIdx);
  if (li) li.classList.toggle('done', checked);
}

function upCarryDraft(date, dayType, itemIdx, roundIdx, kg) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  draft[dKey]['mob_' + itemIdx + '_' + roundIdx + '_kg'] = kg;
  saveDraft(draft);
}

function upWarmupDraft(date, dayType, i, checked) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  draft[dKey]['wu_' + i] = checked;
  saveDraft(draft);
  const li = document.getElementById('wu-' + i);
  if (li) li.classList.toggle('done', checked);
}

function markCompleteMobility(date, dayType) {
  const draft    = getDraft();
  const dKey     = date + '|' + dayType;
  const draftDay = draft[dKey] || {};
  const workout  = WORKOUTS[dayType];
  const exercises = workout.items.map((item, i) => {
    const parsed = parseItem(item);
    const isCarry = parsed.name === "Farmer's carry";
    const rounds = Array.from({ length: parsed.sets }, (_, r) =>
      draftDay['mob_' + i + '_' + (r + 1)] === true
    );
    if (isCarry) {
      const weights = Array.from({ length: parsed.sets }, (_, r) =>
        draftDay['mob_' + i + '_' + (r + 1) + '_kg'] || ''
      );
      return { name: parsed.name, rounds, weights };
    }
    return { name: item, rounds };
  });
  markComplete(date, dayType, exercises);
}

function toggleUpcoming() {
  const body = document.getElementById('upcoming-body');
  const chev = document.getElementById('upcoming-chev');
  if (!body) return;
  const open = body.style.display === 'none';
  body.style.display = open ? 'block' : 'none';
  chev.textContent = open ? '▴' : '▾';
}

function upDraft(date, dayType, ei, s, field, val) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  const sk = ei + '_' + s;
  if (!draft[dKey][sk]) draft[dKey][sk] = {};
  draft[dKey][sk][field] = val;
  saveDraft(draft);
}

// A single note per exercise, stored under a per-exercise key (ei + '_note')
// that can't collide with the per-set keys (ei + '_' + s).
function upExNote(date, dayType, ei, val) {
  const draft = getDraft();
  const dKey  = date + '|' + dayType;
  if (!draft[dKey]) draft[dKey] = {};
  draft[dKey][ei + '_note'] = val;
  saveDraft(draft);
}

// Note for a logged exercise, regardless of format. New sessions store one
// note per exercise; older sessions stored a note on each set — fall back to
// joining those for backward compatibility.
function exNote(ex) {
  if (ex.note !== undefined && ex.note !== null) return String(ex.note).trim();
  if (ex.sets) {
    const perSet = ex.sets.map(s => (s && s.note || '').trim()).filter(Boolean);
    return perSet.join(' · ');
  }
  return '';
}

function collectExercises(date, dayType) {
  const info     = getCycleInfo(date);
  const phase    = info ? info.phase : 1;
  const draft    = getDraft();
  const dKey     = date + '|' + dayType;
  const draftDay = draft[dKey] || {};
  const workout  = getPhaseExercises(dayType, phase);
  if (!workout || !workout.exercises) return [];
  return workout.exercises.map((ex, ei) => {
    const numSets = getSetsForPhase(ex.name, phase);
    const sets = [];
    for (let s = 1; s <= numSets; s++) {
      const sd = draftDay[ei+'_'+s] || {};
      sets.push({ set:s, kg:sd.kg||'', reps:sd.reps||'', rpe:sd.rpe||'' });
    }
    return { name: ex.name, note: draftDay[ei+'_note'] || '', sets };
  });
}

function markCompleteExercise(date, dayType) {
  const exercises = collectExercises(date, dayType);
  markComplete(date, dayType, exercises);
}

function markComplete(date, dayType, exercises) {
  if (!confirm(`Mark ${dayType} session as complete?`)) return;

  const sessions = getSessions();
  const idx = sessions.findIndex(s => s.date === date);
  const session = { id: Date.now(), date, dayType, exercises, completedAt: new Date().toISOString() };

  if (idx >= 0) sessions[idx] = session; else sessions.push(session);
  saveSessions(sessions);

  const draft = getDraft();
  delete draft[date + '|' + dayType];
  saveDraft(draft);

  const btn = document.querySelector('#tab-today .btn-primary');
  if (btn) {
    btn.textContent = 'Saved! ✓';
    btn.className = 'btn btn-success';
    setTimeout(() => renderToday(), 1200);
  }
}

function setLogView(v) {

// Render a set row from log data, handling both old and new formats
function renderSetRow(st, idx) {
  if (st.reps !== undefined) {
    // New format
    return `<tr>
      <td>${st.set || idx+1}</td>
      <td>${st.kg||'—'}</td>
      <td>${st.reps||'—'}</td>
      <td>${st.rpe||'—'}</td></tr>`;
  } else {
    // Old format: r1/r2/r3 within a single row — expand to 3 rows
    let rows = '';
    if (st.r1 || st.r2 || st.r3) {
      [[1,'r1'],[2,'r2'],[3,'r3']].forEach(([n, key]) => {
        if (st[key]) rows += `<tr>
          <td>${n}</td>
          <td>${st.kg||'—'}</td>
          <td>${st[key]||'—'}</td>
          <td>${n===1?st.rpe||'—':'—'}</td></tr>`;
      });
    } else {
      rows = `<tr><td>—</td><td>${st.kg||'—'}</td><td>—</td><td>${st.rpe||'—'}</td></tr>`;
    }
    return rows;
  }
}

function renderLog() {
  const el       = document.getElementById('log-inner');
  const sessions = getSessions();
  const reversed = sessions.slice().reverse();

  // Drop any ticked dates whose session no longer exists, so the count is accurate.
  for (const d of [...selectedLogDates]) {
    if (!sessions.some(s => s.date === d)) selectedLogDates.delete(d);
  }

  const weekOpts = getWeekOptions(sessions);
  const selHtml  = weekOpts.length
    ? weekOpts.map(o => `<option value="${o.value}">${o.label}</option>`).join('')
    : '<option value="">No sessions to export</option>';

  const zipControls = (logView === 'list' && sessions.length) ? `
    <div class="export-row">
      <label class="log-selectall"><input type="checkbox" onchange="toggleSelectAllLogs(this.checked)"> Select all</label>
      <button id="log-zip-btn" class="btn btn-outline btn-sm" style="flex-shrink:0;width:auto;padding:0 18px" onclick="downloadSelectedLogs()" disabled>⬇ Download selected</button>
    </div>` : '';

  let h = `
    <div class="ph"><div class="ph-title">Log</div></div>
    <div class="view-toggle">
      <button class="vt-btn${logView==='list'?' active':''}" onclick="setLogView('list')">Sessions</button>
      <button class="vt-btn${logView==='weekly'?' active':''}" onclick="setLogView('weekly')">Weekly</button>
    </div>
    <div class="export-row">
      <select id="export-week-sel" class="export-sel">${selHtml}</select>
      <button class="btn btn-outline btn-sm" style="flex-shrink:0;width:auto;padding:0 18px" onclick="exportSelectedWeek()"${!weekOpts.length?' disabled':''}>📤 PDF</button>
    </div>
    ${zipControls}`;

  if (!sessions.length) {
    h += `<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No sessions yet</div>
      <div class="empty-sub">Complete your first workout in the Today tab</div>
    </div>`;
  } else if (logView === 'weekly') {
    h += renderWeeklyView(sessions);
  } else {
    reversed.forEach((sess, idx) => {
      const dateFmt  = fmtDate(sess.date, { weekday:'short', day:'numeric', month:'short' });
      const timeFmt  = new Date(sess.completedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      const badgeCls = typeBadgeClass(sess.dayType);
      const hasEx    = sess.exercises && sess.exercises.length > 0;
      const isMob    = hasEx && sess.exercises[0].rounds !== undefined;
      const hasRegEx = hasEx && sess.exercises[0].sets !== undefined && sess.exercises[0].sets;

      h += `
        <div class="session-card">
          <div class="session-hdr" onclick="toggleSess(${idx})">
            <div style="display:flex;align-items:center;gap:10px;min-width:0">
              <input type="checkbox" class="log-select" data-date="${sess.date}" ${selectedLogDates.has(sess.date)?'checked':''}
                onclick="event.stopPropagation()" onchange="toggleLogSelect('${sess.date}', this.checked)">
              <div>
                <div class="session-date">${dateFmt}</div>
                <div class="session-meta">Completed ${timeFmt}</div>
              </div>
            </div>
            <div class="session-right">
              <span class="badge ${badgeCls}">${sess.dayType}</span>
              <span class="session-chev" id="schev-${idx}">▾</span>
            </div>
          </div>
          <div class="session-body" id="sbody-${idx}">`;

      if (isMob) {
        sess.exercises.forEach(ex => {
          const isCarry = ex.name === "Farmer's carry";
          h += `<div class="sess-ex">
            <div class="sess-ex-name">${ex.name}</div>
            <div style="font-size:13px;padding:4px 0;line-height:2">`;
          ex.rounds.forEach((done, r) => {
            const weightLabel = isCarry && ex.weights && ex.weights[r]
              ? ` <span style="color:var(--text);font-weight:700">${ex.weights[r]} kg</span>`
              : '';
            h += `<span style="margin-right:14px">${done ? '✅' : '⬜'} Set ${r+1}${weightLabel}</span>`;
          });
          h += `</div></div>`;
        });
      } else if (hasRegEx) {
        sess.exercises.forEach(ex => {
          const note = exNote(ex);
          h += `<div class="sess-ex">
            <div class="sess-ex-name">${ex.name}</div>
            ${note ? `<div class="prev-note">📝 ${esc(note)}</div>` : ''}
            <table class="view-tbl">
              <thead><tr><th>Set</th><th>kg</th><th>Reps</th><th>RPE</th></tr></thead>
              <tbody>`;
          ex.sets.forEach((st, si) => {
            h += renderSetRow(st, si);
          });
          h += `</tbody></table></div>`;
        });
      } else {
        h += `<div style="padding-top:12px;font-size:14px;color:var(--text-secondary)">${sess.dayType} session — no data recorded</div>`;
      }

      h += `</div></div>`;

  el.innerHTML = h;
  updateZipBtn();
}

function toggleSess(idx) {
  const body = document.getElementById('sbody-'+idx);
  const chev = document.getElementById('schev-'+idx);
  const open = body.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function getWeekOptions(sessions) {
  if (!sessions) sessions = getSessions();
  if (!sessions.length) return [];
  const weeks = new Map();
  sessions.forEach(s => {
    const d   = parseLocal(s.date);
    const dow = d.getDay();
    const ws  = new Date(d);
    ws.setDate(d.getDate() - dow);
    const wsStr = localDateStr(ws);
    weeks.set(wsStr, (weeks.get(wsStr) || 0) + 1);
  });
  return Array.from(weeks.entries())
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([wsStr, count]) => {
      const we = new Date(parseLocal(wsStr));
      we.setDate(we.getDate() + 6);
      const label = `${fmtDate(wsStr,{day:'numeric',month:'short',year:'numeric'})} – ${fmtDate(localDateStr(we),{day:'numeric',month:'short'})} (${count} session${count>1?'s':''})`;
      return { value: wsStr, label };
    });
}

function exportSelectedWeek() {
  const sel = document.getElementById('export-week-sel');
  if (!sel || !sel.value) return;
  exportWeek(sel.value);
}

    .sub{color:#666;font-size:14px;margin-bottom:24px}

// Renders the heading + exercise tables for one session (no <html> wrapper).
// Handles both mobility (rounds) and strength sessions, and the legacy
// per-set r1/r2/r3 format. Reused by the week export and per-session zip.
function sessionBodyHtml(s) {
  let html = `<h2>${fmtDate(s.date,{weekday:'long',day:'numeric',month:'long'})} &mdash; ${s.dayType}</h2>`;
  const hasEx  = s.exercises && s.exercises.length > 0;
  const isMob  = hasEx && s.exercises[0].rounds !== undefined;
  const hasReg = hasEx && s.exercises[0].sets;
  if (isMob) {
    s.exercises.forEach(ex => {
      html += `<h3>${ex.name}</h3>`;
      const isCarry = ex.name === "Farmer's carry";
      ex.rounds.forEach((done, r) => {
        const wLabel = isCarry && ex.weights && ex.weights[r]
          ? `<span class="carry-weight">${ex.weights[r]} kg</span>` : '';
        html += `<div class="mob-item">${done ? '&#x2705;' : '&#x2B1C;'} Set ${r+1} ${wLabel}</div>`;
      });
    });
  } else if (hasReg) {
    s.exercises.forEach(ex => {
      const isNew = ex.sets[0] && ex.sets[0].reps !== undefined;
      const note = exNote(ex);
      html += `<h3>${ex.name}</h3>`;
      if (note) html += `<p class="ex-note">📝 ${esc(note)}</p>`;
      html += `<table><tr><th>Set</th><th>kg</th><th>Reps</th><th>RPE</th></tr>`;
      if (isNew) {
        ex.sets.forEach(st => {
          html += `<tr><td>${st.set||''}</td><td>${st.kg||'—'}</td><td>${st.reps||'—'}</td><td>${st.rpe||'—'}</td></tr>`;
        });
      } else {
        // Legacy per-set format
        ex.sets.forEach((st, si) => {
          [[1,'r1'],[2,'r2'],[3,'r3']].forEach(([n,key]) => {
            if (st[key]) html += `<tr><td>${n}</td><td>${st.kg||'—'}</td><td>${st[key]||'—'}</td><td>${n===1?st.rpe||'—':'—'}</td></tr>`;
          });
        });
      }
      html += `</table>`;
    });
  } else {
    html += `<p class="no-sessions">No data recorded.</p>`;
  }
  return html;
}

// A complete standalone HTML document for a single session (one file per zip entry).
function sessionToHtml(s) {
  return `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Workout — ${fmtDate(s.date,{day:'numeric',month:'short',year:'numeric'})} ${s.dayType}</title>
  <style>${EXPORT_STYLE}</style></head><body>
  <h1>Workout Log</h1>
  ${sessionBodyHtml(s)}
  </body></html>`;
}

function exportWeek(weekStartStr) {
  const wkStart = parseLocal(weekStartStr);
  const wkEnd   = new Date(wkStart);
  wkEnd.setDate(wkStart.getDate() + 6);
  const weStr   = localDateStr(wkEnd);

  const sessions = getSessions().filter(s => s.date >= weekStartStr && s.date <= weStr);

  let doc = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Workout Log</title>
  <style>${EXPORT_STYLE}</style></head><body>
  <h1>Workout Log</h1>
  <div class="sub">${fmtDate(weekStartStr,{day:'numeric',month:'long',year:'numeric'})} &ndash; ${fmtDate(weStr,{day:'numeric',month:'long',year:'numeric'})}</div>`;

  if (!sessions.length) {
    doc += `<p class="no-sessions">No sessions logged this week.</p>`;
  } else {
    sessions.forEach(s => { doc += sessionBodyHtml(s); });
  }

  doc += `</body></html>`;

  const blob = new Blob([doc], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const pw   = window.open(url, '_blank');
  if (pw) pw.addEventListener('load', () => { pw.focus(); pw.print(); });
}

// ── Log selection → zip download ──
function toggleLogSelect(date, checked) {
  if (checked) selectedLogDates.add(date); else selectedLogDates.delete(date);
  updateZipBtn();
}

function toggleSelectAllLogs(checked) {
  document.querySelectorAll('#log-inner .log-select').forEach(b => {
    b.checked = checked;
    if (checked) selectedLogDates.add(b.dataset.date); else selectedLogDates.delete(b.dataset.date);
  });
  updateZipBtn();
}

function updateZipBtn() {
  const btn = document.getElementById('log-zip-btn');
  if (!btn) return;
  const n = selectedLogDates.size;
  btn.disabled = n === 0;
  btn.textContent = n ? `⬇ Download ${n} selected` : '⬇ Download selected';
}

async function downloadSelectedLogs() {
  if (!selectedLogDates.size || typeof JSZip === 'undefined') return;
  const sessions = getSessions().filter(s => selectedLogDates.has(s.date));
  if (!sessions.length) return;

  const zip = new JSZip();
  const folder = zip.folder('workout-logs');
  const used = new Set();
  sessions.forEach(s => {
    const base = `${s.date}-${(s.dayType || 'session').replace(/[^a-z0-9]+/gi, '-')}`;
    let name = base, n = 2;
    while (used.has(name)) name = `${base}-${n++}`;
    used.add(name);
    folder.file(`${name}.html`, sessionToHtml(s));
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `workout-logs-${localDateStr()}.zip`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function renderWeeklyView(sessions) {
  const start = getStartDate();
  const today = localDateStr();
  if (!start) return `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No start date set</div><div class="empty-sub">Go to Settings to set your program start date</div></div>`;

  const sessionMap = {};
  sessions.forEach(s => { sessionMap[s.date] = s; });

  const totalDays  = daysBetween(start, today);
  const totalWeeks = Math.floor(totalDays / 7) + 1;

  const typeCounts = {};
  const typeDone   = {};

  let h = '';

  for (let w = totalWeeks; w >= 1; w--) {
    const weekOffset    = (w - 1) * 7;
    const weekStartDate = new Date(parseLocal(start));
    weekStartDate.setDate(weekStartDate.getDate() + weekOffset);
    const weekEndDate = new Date(weekStartDate);
    weekEndDate.setDate(weekStartDate.getDate() + 6);

    const wsStr = localDateStr(weekStartDate);
    const weStr = localDateStr(weekEndDate);
    const wInfo = getCycleInfo(wsStr);
    const phase = wInfo ? wInfo.phase : 1;

    const wsFmt = fmtDate(wsStr, {day:'numeric', month:'short'});
    const weFmt = fmtDate(weStr, {day:'numeric', month:'short'});

    h += `<div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <div style="padding:11px 16px;background:var(--surface-alt);border-bottom:1px solid var(--border)">
        <div style="font-weight:700;font-size:15px">Week ${w} &nbsp;<span style="font-size:12px;font-weight:400;color:var(--text-secondary)">Phase ${phase}</span></div>
        <div style="font-size:12px;color:var(--text-secondary)">${wsFmt} &ndash; ${weFmt}</div>
      </div>`;

    for (let d = 0; d < 7; d++) {
      const dayDate  = new Date(weekStartDate);
      dayDate.setDate(weekStartDate.getDate() + d);
      const dayStr   = localDateStr(dayDate);
      const isFuture = dayStr > today;
      const dayType  = DAY_TYPES[d];
      const isRest   = dayType === 'Rest';
      const done     = !!sessionMap[dayStr];

      if (!isFuture && !isRest) {
        typeCounts[dayType] = (typeCounts[dayType] || 0) + 1;
        if (done) typeDone[dayType] = (typeDone[dayType] || 0) + 1;
      }

      const badgeCls = typeBadgeClass(dayType);
      const dayFmt   = parseLocal(dayStr).toLocaleDateString('en-GB', {weekday:'short', day:'numeric'});

      let statusHtml;
      if (isRest)        statusHtml = `<span style="font-size:12px;color:var(--text-secondary)">Rest</span>`;
      else if (isFuture) statusHtml = `<span style="font-size:12px;color:var(--text-secondary)">—</span>`;
      else if (done)     statusHtml = `<span style="font-size:12px;color:var(--text);font-weight:700">✅ Done</span>`;
      else               statusHtml = `<span style="font-size:12px;color:var(--text-secondary);font-weight:600">⬜ Missed</span>`;

      const noBorder = d === 6 ? 'border-bottom:none' : 'border-bottom:1px solid var(--border)';
      h += `<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;${noBorder};${isFuture?'opacity:.45':''}">
        <span class="badge ${badgeCls}" style="min-width:80px;justify-content:center;font-size:12px">${dayType}</span>
        <div style="flex:1;font-size:13px;color:var(--text-secondary)">${dayFmt}</div>
        ${statusHtml}
      </div>`;
    }
    h += `</div>`;
  }

  // Adherence summary
  const uniqueTypes = [...new Set(DAY_TYPES.filter(t => t !== 'Rest'))];
  h += `<div class="sec-label">Adherence by Day Type</div>
  <div class="card" style="padding:0;overflow:hidden">
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:var(--surface-alt)">
        <th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Day Type</th>
        <th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Done</th>
        <th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Sched</th>
        <th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px">Miss%</th>
      </tr></thead>
      <tbody>`;
  uniqueTypes.forEach(t => {
    const sched    = typeCounts[t] || 0;
    const doneCount= typeDone[t]   || 0;
    const miss     = sched > 0 ? Math.round((1 - doneCount / sched) * 100) : null;
    const badgeCls = typeBadgeClass(t);
    h += `<tr style="border-top:1px solid var(--border)">
      <td style="padding:10px 14px"><span class="badge ${badgeCls}">${t}</span></td>
      <td style="padding:10px 14px;text-align:center;color:var(--text);font-weight:700">${doneCount}</td>
      <td style="padding:10px 14px;text-align:center">${sched}</td>
      <td style="padding:10px 14px;text-align:center;${miss !== null && miss > 50 ? 'color:var(--text);font-weight:700' : ''}">${miss !== null ? miss+'%' : '—'}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;

  return h;
}

  // Build farmer's carry history
  const sessions = getSessions();
  let carryRows = '';
  sessions.slice().reverse().forEach(sess => {
    if (!sess.exercises) return;
    const carry = sess.exercises.find(e => e.name === "Farmer's carry");
    if (!carry || !carry.weights) return;
    const weightDisplay = carry.weights.filter(w => w && parseFloat(w) > 0).join(' / ');
    if (!weightDisplay) return;
    const dateFmt = fmtDate(sess.date, { weekday:'short', day:'numeric', month:'short' });
    carryRows += `<tr><td>${dateFmt}</td><td style="text-align:right;font-weight:700;color:var(--text)">${weightDisplay} kg</td></tr>`;
  });

  const carrySection = carryRows ? `
    <div class="sec-label">Farmer's Carry — Weight History</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="prog-tbl">
        <thead><tr><th>Date</th><th style="text-align:right">Weight (sets)</th></tr></thead>
        <tbody>${carryRows}</tbody>
      </table>
    </div>` : '';

  document.getElementById('progression-inner').innerHTML = `
    <div class="ph">
      <div class="ph-title">Progression</div>
      <div class="ph-sub">Overload rules, targets & DNA flags</div>
    </div>

    <div class="sec-label">Overload Rules</div>
    <div class="card">
      <div class="rule-row"><strong>Method:</strong> Reps first, then weight. Hit top of rep range → add weight next session.</div>
      <div class="rule-row"><strong>Compounds</strong> (bench, row, RDL): 2.5–5 kg jumps acceptable</div>
      <div class="rule-row"><strong>Isolation</strong> (lateral raise, curl): 1–2 kg max per increase</div>
      <div class="rule-row"><strong>OHP:</strong> 1 kg max per increase — form over weight, always</div>
      <div class="rule-row"><span class="red-flag">⚑ Red flag:</span> Same weight 3+ sessions in a row = plateau, must increase</div>
      <div class="rule-row"><span class="red-flag">⚑ Red flag:</span> Can't hit bottom of rep range = reduce weight immediately</div>
      <div class="rule-row"><strong>Body weight:</strong> check weekly, morning post-bathroom — target 0.3–0.5 kg/week gain</div>
    </div>

    <div class="sec-label">6-Month Targets (increase from starting weight)</div>
    <div class="card" style="padding:0;overflow:hidden">
      <table class="prog-tbl">
        <thead><tr><th>Exercise</th><th>6-Month Target Increase</th></tr></thead>
        <tbody>
          <tr><td>DB bench press</td><td>+8–12 kg</td></tr>
          <tr><td>Incline DB press</td><td>+6–10 kg</td></tr>
          <tr><td>Overhead DB press</td><td>+4–6 kg</td></tr>
          <tr><td>One-arm DB row</td><td>+10–15 kg</td></tr>
          <tr><td>Romanian deadlift</td><td>+8–12 kg</td></tr>
          <tr><td>Goblet squat</td><td>+8–12 kg</td></tr>
          <tr><td>Bulgarian split squat</td><td>+4–8 kg</td></tr>
          <tr><td>Farmer's carry</td><td>+10–20 kg</td></tr>
        </tbody>
      </table>
    </div>

    ${carrySection}

    <div class="sec-label">DNA Flags — Permanent Training Rules</div>
    <div class="dna-card">
      <div class="dna-title">Always Active — Never Override</div>
      <div class="dna-item">Rotator cuff risk elevated → OHP hard cap RPE 7; prioritise reverse fly + face pulls</div>
      <div class="dna-item">ACL risk elevated → BSS hard cap RPE 7.5; stop immediately if knee tracks inward</div>
      <div class="dna-item">Poor muscle recovery → never compress the 7-day cycle; never skip mobility days</div>
      <div class="dna-item">Poor post-exercise inflammation → train through mild soreness, not sharp pain; fish oil daily</div>
      <div class="dna-item">Poor lactate threshold → Zone 2 walking only for cardio; no HIIT</div>
      <div class="dna-item">Excellent heart capacity + carb response → rice-based carbs respond well; prioritise carbs pre-compounds</div>
    </div>`;
}
