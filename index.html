function renderSettings() {
  const startDate = getStartDate();
  const today     = localDateStr();
  const info      = startDate ? getCycleInfo(today) : null;

  const pauses    = getPauses();
  const pausesHtml = pauses.length
    ? pauses.map((p, i) => {
        const active = daysBetween(p.start, today) >= 0 && daysBetween(today, p.end) >= 0;
        const days   = daysBetween(p.start, p.end) + 1;
        return `
      <div class="setting-row">
        <div>
          <div class="setting-label">${fmtDate(p.start, {day:'numeric', month:'short'})} → ${fmtDate(p.end, {day:'numeric', month:'short', year:'numeric'})}</div>
          <div class="setting-sub">${days} day${days>1?'s':''} paused${active ? ' · active now' : ''}</div>
        </div>
        <button class="btn btn-outline btn-sm" style="width:auto;padding:0 14px" onclick="removePause(${i})">Remove</button>
      </div>`;
      }).join('')
    : `<div class="setting-row"><div class="setting-sub">No breaks scheduled.</div></div>`;

  document.getElementById('settings-inner').innerHTML = `
    <div class="ph">
      <div class="ph-title">Settings</div>
    </div>

    <div class="card">
      <div class="setting-row">
        <div>
          <div class="setting-label">Program Start Date</div>
          <div class="setting-sub">Sets Day 1 of your 7-day cycle</div>
        </div>
        <input type="date" class="date-input" id="startDateInput"
          value="${startDate||''}" max="${today}"
          onchange="saveStartDate(this.value)">
      </div>
      <div class="setting-row">
        <div class="setting-label">Current Week</div>
        <div class="setting-val">${info ? 'Week ' + info.weekNum : '—'}</div>
      </div>
      <div class="setting-row">
        <div class="setting-label">Current Phase</div>
        <div class="setting-val">${info ? 'Phase ' + info.phase + ' of 4' : '—'}</div>
      </div>
      <div class="setting-row">
        <div class="setting-label">Today's Day Type</div>
        <div class="setting-val">${info ? 'Day ' + info.cycleDay + ' — ' + info.dayType : '—'}</div>
      </div>
    </div>

    <div class="sec-label">Breaks</div>
    <div class="card">
      <div class="setting-row">
        <div>
          <div class="setting-label">Pause progress</div>
          <div class="setting-sub">Traveling or resting? Program stays frozen on these days and resumes after.</div>
        </div>
      </div>
      ${pausesHtml}
      <div class="setting-row" style="gap:8px;flex-wrap:wrap">
        <input type="date" class="date-input" id="pauseFrom" placeholder="From">
        <input type="date" class="date-input" id="pauseTo" placeholder="To">
        <button class="btn btn-outline btn-sm" style="width:auto;padding:0 16px" onclick="addPause()">Add break</button>
      </div>
    </div>

    <div class="sec-label">Data</div>
    <div class="card">
      <div class="setting-row">
        <div class="setting-label">Sessions logged</div>
        <div class="setting-val">${getSessions().length}</div>
      </div>
    </div>

    <div style="height:6px"></div>
    <button class="btn" onclick="exportBackup()">Export Backup (JSON)</button>
    <div style="height:14px"></div>
    <button class="btn btn-danger" onclick="clearAll()">Clear All Data</button>
    <div style="height:14px"></div>
    <button class="btn" onclick="signOut()">Sign out</button>
    <div style="height:10px"></div>
    <div style="text-align:center;font-size:12px;color:var(--text-secondary)">Synced to your account via Supabase</div>`;
}

async function saveStartDate(val) {
  cache.startDate = val;
  renderSettings();
  const { error } = await sb.from('user_state').upsert({ start_date: val }, { onConflict: 'user_id' });
  if (error) { console.error('saveStartDate failed', error); alert('Failed to save start date: ' + error.message); return false; }
  return true;
}

async function savePauses(v) {
  cache.pauses = v;
  renderSettings();
  const { error } = await sb.from('user_state').upsert({ pauses: v }, { onConflict: 'user_id' });
  if (error) {
    console.error('savePauses failed', error);
    const hint = /pauses/.test(error.message || '')
      ? '\n\nThe "pauses" column may be missing — apply migration 0004 (supabase db push) or add it in the Supabase SQL editor.'
      : '';
    alert('Failed to save breaks: ' + error.message + hint);
    return false;
  }
  return true;
}

function addPause() {
  const fromEl = document.getElementById('pauseFrom');
  const toEl   = document.getElementById('pauseTo');
  const from = fromEl && fromEl.value;
  const to   = toEl && toEl.value;
  if (!from || !to) { alert('Pick both a start and end date for the break.'); return; }
  if (daysBetween(from, to) < 0) { alert('The end date must be on or after the start date.'); return; }
  // Reject overlap with any existing break so pausedDaysBefore stays correct.
  const overlaps = getPauses().some(p =>
    daysBetween(p.start, to) >= 0 && daysBetween(from, p.end) >= 0);
  if (overlaps) { alert('That range overlaps an existing break.'); return; }
  const next = [...getPauses(), { start: from, end: to }]
    .sort((a, b) => a.start.localeCompare(b.start));
  savePauses(next);
}

function removePause(i) {
  const next = getPauses().filter((_, idx) => idx !== i);
  savePauses(next);
}

async function clearAll() {
  if (!confirm('Delete ALL workout data? This cannot be undone.')) return;
  if (!confirm('Final confirmation — permanently clear everything?')) return;
  await sb.from('sessions').delete().not('id', 'is', null);
  await sb.from('user_state').delete().not('user_id', 'is', null);
  await sb.from('chat_messages').delete().not('id', 'is', null);
  cache.sessions = [];
  cache.draft = {};
  cache.startDate = null;
  cache.pauses = [];
  renderSettings();
  alert('All data cleared.');
}

function exportBackup() {
  const backup = {
    sessions: getSessions(),
    draft: getDraft(),
    startDate: getStartDate(),
    pauses: getPauses(),
    exportedAt: new Date().toISOString()
  };

  const jsonStr = JSON.stringify(backup, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);

  const dateStr = localDateStr();
  const filename = `workout-tracker-backup-${dateStr}.json`;

  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

async function renderCoach() {
  const el = document.getElementById('coach-inner');
  el.innerHTML = `
    <div class="ph"><div class="ph-title">Coach</div><div class="ph-sub">Your personal trainer, aware of your whole program</div></div>
    <div class="coach-thread" id="coach-thread"></div>
    <div class="coach-input-row">
      <textarea class="coach-input" id="coach-input" rows="1" placeholder="Ask your coach anything…"></textarea>
      <button class="coach-send-btn" id="coach-send-btn" onclick="handleCoachSend()">Send</button>
    </div>
    <div class="coach-error" id="coach-error"></div>`;

  const { data: rows, error } = await sb
    .from('chat_messages')
    .select('role, content, created_at')
    .order('created_at');

  const threadEl = document.getElementById('coach-thread');
  if (error) {
    document.getElementById('coach-error').textContent = 'Failed to load conversation: ' + error.message;
    return;
  }
  if (!rows.length) {
    threadEl.innerHTML = '<div class="coach-empty">No conversation yet — ask your coach something, or tap "Ask Claude" on any exercise.</div>';
    return;
  }
  threadEl.innerHTML = rows.map(m => `<div class="coach-msg ${m.role}">${esc(m.content)}</div>`).join('');
  threadEl.scrollIntoView({ block: 'end' });
}

function handleCoachSend() {
  const input = document.getElementById('coach-input');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';
  sendToCoach(message);
}

// Structured program context sent to the coach / sequence functions so Claude
// can see the schedule and today's exercises in program order.
function buildProgramContext(dayType, phase) {
  const wk = WORKOUTS[dayType];
  const ctx = { cycle: DAY_TYPES, dayType, isMobility: false, isRest: false, todayExercises: [] };
  if (!wk) return ctx;
  if (wk.rest) { ctx.isRest = true; return ctx; }
  if (wk.checklistOnly) {
    ctx.isMobility = true;
    ctx.todayExercises = (wk.items || []).map(it => {
      const p = parseItem(it);
      return { name: p.name, targetReps: '', sets: p.sets };
    });
    return ctx;
  }
  ctx.todayExercises = (wk.exercises || []).map(ex => ({
    name: ex.name, targetReps: ex.reps, sets: getSetsForPhase(ex.name, phase), warning: ex.warning || null
  }));
  return ctx;
}

async function sendToCoach(message) {
  // Elements are re-queried fresh after every `await` below, rather than
  // captured once here, because renderCoach() can rebuild #coach-inner's
  // entire subtree (e.g. if the user navigates away and back) while this
  // request is still in flight — a captured reference would go stale and
  // silently write to a detached, invisible node instead of throwing.
  const threadEl = document.getElementById('coach-thread');
  document.getElementById('coach-error').textContent = '';

  if (threadEl.querySelector('.coach-empty')) threadEl.innerHTML = '';
  threadEl.insertAdjacentHTML('beforeend', `<div class="coach-msg user">${esc(message)}</div>`);
  threadEl.insertAdjacentHTML('beforeend', `<div class="coach-msg assistant pending" id="coach-pending">Thinking…</div>`);
  threadEl.scrollIntoView({ block: 'end' });
  const initialSendBtn = document.getElementById('coach-send-btn');
  if (initialSendBtn) initialSendBtn.disabled = true;

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    const errorEl = document.getElementById('coach-error');
    if (errorEl) errorEl.textContent = 'Not signed in.';
    document.getElementById('coach-pending')?.remove();
    const sendBtn = document.getElementById('coach-send-btn');
    if (sendBtn) sendBtn.disabled = false;
    return;
  }

  const today = localDateStr();
  const info = getStartDate() ? getCycleInfo(today) : null;
  const phase = info ? info.phase : 1;
  const weekNum = info ? info.weekNum : 1;
  const dayType = info ? info.dayType : '';
  const isDeload = phase === 4 && weekNum <= 22;
  const program = buildProgramContext(dayType, phase);

  try {
    const res = await fetch(SUPABASE_URL + '/functions/v1/coach', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'Authorization': 'Bearer ' + session.access_token
      },
      body: JSON.stringify({ message, phase, weekNum, dayType, isDeload, program })
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || 'Request failed');

    const pending = document.getElementById('coach-pending');
    if (pending) {
      pending.textContent = body.reply;
      pending.classList.remove('pending');
      pending.removeAttribute('id');
    }
  } catch (err) {
    document.getElementById('coach-pending')?.remove();
    const errorEl = document.getElementById('coach-error');
    if (errorEl) errorEl.textContent = 'Error: ' + err.message;
  } finally {
    const sendBtn = document.getElementById('coach-send-btn');
    if (sendBtn) sendBtn.disabled = false;
  }
}
